<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RandomOS 1.0 Beta</title>
    <style>
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body { 
            background: #0f0f0f; display: flex; justify-content: center; 
            align-items: center; height: 100vh; overflow: hidden;
        }

        .phone {
            width: 310px; height: 640px; background: #000;
            border: 12px solid #222; border-radius: 50px;
            position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .screen-container {
            width: 100%; height: 100%; border-radius: 38px;
            overflow: hidden; position: relative; background: #000;
        }

        /* STATUS BAR */
        .status-bar {
            position: absolute; top: 0; width: 100%; height: 35px;
            padding: 0 22px; display: flex; justify-content: space-between;
            align-items: center; z-index: 4500; color: white; font-size: 0.75rem; font-weight: 600;
        }

        .punch-hole {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 20px; background: #000; border-radius: 50%; z-index: 5000;
        }

        /* OVERLAYS */
        #brightness-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; opacity: 0; pointer-events: none; z-index: 4000;
        }

        #black-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 5500; display: none;
        }

        /* WALLPAPER */
        .wallpaper {
            position: absolute; width: 100%; height: 100%;
            background-color: #1a1a1a; background-image: url('1000005643.jpg');
            background-size: cover; background-position: center;
            transition: filter 0.5s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1;
        }
        .wallpaper.app-active { filter: blur(20px); transform: scale(1.1); }

        /* SCREENS */
        .screen {
            position: absolute; width: 100%; height: 100%; z-index: 5;
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hidden { opacity: 0; pointer-events: none; transform: scale(0.9); }
        .active { opacity: 1; pointer-events: all; transform: scale(1); }

        #lock-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .time { font-size: 3.8rem; font-weight: 200; }

        #home-screen { padding: 60px 20px; }
        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .app { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .icon {
            width: 55px; height: 55px; border-radius: 16px; margin-bottom: 6px;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.6rem; background: white; box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }
        .app span { color: white; font-size: 0.7rem; font-weight: 500; }

        /* APP WINDOW ZOOM ANIMATION */
        .app-window {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #f2f2f7; z-index: 1000; border-radius: 38px;
            opacity: 0; transform: scale(0.6); pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s ease;
            padding: 60px 25px;
        }
        .app-window.open { opacity: 1; transform: scale(1); pointer-events: all; }

        .settings-item {
            background: white; padding: 18px; border-radius: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            color: #000; font-weight: 600; cursor: pointer;
        }

        .back-btn { color: #007aff; font-weight: 700; margin-bottom: 25px; cursor: pointer; }

        /* NAVIGATION BAR SYSTEM */
        #nav-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 40px;
            z-index: 5600; display: flex; justify-content: center; align-items: center;
        }

        /* Swipe Line Mode */
        #home-bar {
            width: 120px; height: 5px; background: rgba(255,255,255,0.7);
            border-radius: 10px; cursor: pointer; display: block;
        }

        /* 3-Button Mode */
        #three-buttons {
            width: 100%; display: none; justify-content: space-around; align-items: center;
            padding: 0 30px;
        }
        .nav-btn {
            color: white; font-size: 1.2rem; cursor: pointer; width: 40px; height: 40px;
            display: flex; justify-content: center; align-items: center;
        }

        .status-trigger {
            position: absolute; top: 0; right: 0; width: 40%; height: 40px; z-index: 4600; cursor: pointer;
        }

        /* CONTROL CENTER */
        #control-center {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(25px);
            z-index: 4800; transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            padding: 60px 20px; display: flex; flex-direction: column; gap: 20px;
        }
        #control-center.open { transform: translateY(0); }
    </style>
</head>
<body>

    <div class="phone">
        <div class="screen-container">
            <div class="status-bar">
                <div id="status-time">00:00</div>
                <div style="display:flex; gap:5px;"><span>5G</span></div>
            </div>

            <div class="status-trigger" onclick="toggleCC(true)"></div>
            <div class="punch-hole"></div>
            <div id="black-overlay"></div>
            <div id="brightness-overlay"></div>
            <div class="wallpaper" id="main-wallpaper"></div>

            <div id="control-center">
                <div style="background:rgba(255,255,255,0.1); padding:20px; border-radius:22px; color:white;">
                    <label style="font-size:0.8rem; font-weight:600;">Brightness</label>
                    <input type="range" style="width:100%; margin-top:10px;" min="0" max="100" value="100" oninput="adjustBrightness(this.value)">
                </div>
                <div style="text-align:center; color:white; font-size:2rem; cursor:pointer;" onclick="toggleCC(false)">︿</div>
            </div>

            <div id="lock-screen" class="screen active">
                <div class="time" id="clock-large">00:00</div>
                <div style="margin-top:200px; color:white; opacity:0.6;">Swipe or Click Bottom to Start</div>
            </div>

            <div id="home-screen" class="screen hidden">
                <div class="app-grid">
                    <div class="app" onclick="openApp('settings-main')">
                        <div class="icon">⚙️</div>
                        <span>Settings</span>
                    </div>
                </div>
            </div>

            <div id="settings-main" class="app-window">
                <h1 style="margin-bottom: 25px;">Settings</h1>
                <div class="settings-item" onclick="showSubPage('nav-settings')">
                    <span>Navigation Bar</span>
                    <span>❯</span>
                </div>
                <div class="settings-item" onclick="showSubPage('custom-page')">
                    <span>Wallpaper</span>
                    <span>❯</span>
                </div>
            </div>

            <div id="nav-settings" class="app-window">
                <div class="back-btn" onclick="showSubPage('settings-main')">❮ Back</div>
                <h2 style="margin-bottom: 20px;">Navigation Style</h2>
                <div class="settings-item" onclick="setNav('swipe')">
                    <span>Swipe Navigation</span>
                    <span id="check-swipe">✓</span>
                </div>
                <div class="settings-item" onclick="setNav('buttons')">
                    <span>3-Button Navigation</span>
                    <span id="check-buttons" style="display:none;">✓</span>
                </div>
            </div>

            <div id="custom-page" class="app-window">
                <div class="back-btn" onclick="showSubPage('settings-main')">❮ Back</div>
                <h1 style="margin-bottom: 25px;">Appearance</h1>
                <div class="settings-item" onclick="triggerFileSelect()">
                    <span>Change Wallpaper</span>
                </div>
            </div>

            <div id="nav-container">
                <div id="home-bar" onclick="handleNavAction('home')"></div>
                <div id="three-buttons">
                    <div class="nav-btn" onclick="handleNavAction('back')">◂</div>
                    <div class="nav-btn" onclick="handleNavAction('home')">●</div>
                    <div class="nav-btn" onclick="handleNavAction('recent')">■</div>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="wallpaper-input" hidden accept="image/*">

    <script>
        const wallpaperLayer = document.getElementById('main-wallpaper');

        function toggleCC(show) {
            document.getElementById('control-center').classList.toggle('open', show);
        }

        function adjustBrightness(val) {
            document.getElementById('brightness-overlay').style.opacity = (100 - val) / 125;
        }

        // NAVIGATION LOGIC
        function setNav(type) {
            const bar = document.getElementById('home-bar');
            const buttons = document.getElementById('three-buttons');
            const checkS = document.getElementById('check-swipe');
            const checkB = document.getElementById('check-buttons');

            if (type === 'swipe') {
                bar.style.display = 'block';
                buttons.style.display = 'none';
                checkS.style.display = 'block';
                checkB.style.display = 'none';
            } else {
                bar.style.display = 'none';
                buttons.style.display = 'flex';
                checkS.style.display = 'none';
                checkB.style.display = 'block';
            }
        }

        function handleNavAction(action) {
            if (action === 'home') {
                toggleCC(false);
                const lock = document.getElementById('lock-screen');
                if (lock.classList.contains('active')) {
                    lock.classList.replace('active', 'hidden');
                    document.getElementById('home-screen').classList.replace('hidden', 'active');
                } else {
                    closeAllApps();
                }
            } else if (action === 'back') {
                // Simplified back logic: if in sub-page go to main settings, else close app
                const navSet = document.getElementById('nav-settings');
                const custSet = document.getElementById('custom-page');
                if (navSet.classList.contains('open') || custSet.classList.contains('open')) {
                    showSubPage('settings-main');
                } else {
                    closeAllApps();
                }
            }
        }

        function openApp(id) {
            document.getElementById(id).classList.add('open');
            wallpaperLayer.classList.add('app-active');
        }

        function closeAllApps() {
            document.querySelectorAll('.app-window').forEach(win => win.classList.remove('open'));
            wallpaperLayer.classList.remove('app-active');
        }

        function showSubPage(id) {
            document.querySelectorAll('.app-window').forEach(win => {
                if(win.id !== id) win.classList.remove('open');
            });
            document.getElementById(id).classList.add('open');
        }

        function triggerFileSelect() { document.getElementById('wallpaper-input').click(); }

        document.getElementById('wallpaper-input').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => { wallpaperLayer.style.backgroundImage = `url(${e.target.result})`; };
                reader.readAsDataURL(file);
            }
        });

        function updateTime() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock-large').innerText = timeStr;
            document.getElementById('status-time').innerText = timeStr;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
