<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FakeOS 1.0</title>
    <style>
        :root { 
            --spd: 0.5s; 
            --ios-spring: cubic-bezier(0.3, 1.2, 0.3, 1); 
            --bright: 1;
            --ios-blue: #007aff;
            --bg-app: #f2f2f7;
            --bg-item: #fff;
            --text-main: #000;
            --border-color: #d1d1d6;
        }

        .dark-mode {
            --bg-app: #1c1c1e;
            --bg-item: #2c2c2e;
            --text-main: #ffffff;
            --border-color: #3a3a3c;
        }
        
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: radial-gradient(circle at center, #1c1c1e 0%, #000 100%); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation;
        }
        
        .phone { 
            width: 290px; height: 600px; background: #000; 
            border: 10px solid #2c2c2e; border-radius: 54px; 
            position: relative; overflow: hidden; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; pointer-events: none; z-index: 3800; opacity: calc(1 - var(--bright)); }
        .punch-hole { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 80px; height: 22px; background: #000; border-radius: 20px; z-index: 3900; border: 1px solid #1a1a1a; }
        
        .status-bar { position: absolute; top: 0; width: 100%; height: 40px; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; box-sizing: border-box; color: white; font-size: 12px; font-weight: 600; z-index: 3500; }

        .control-center { position: absolute; top: 0; right: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 2500; transform: translateY(-100%); transition: transform 0.5s var(--ios-spring); display: flex; flex-direction: column; align-items: center; padding-top: 100px; gap: 15px; }
        .cc-open { transform: translateY(0); }
        .cc-slider-box { width: 220px; background: rgba(255,255,255,0.15); padding: 20px; border-radius: 28px; color: white; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .cc-btn { width: 220px; padding: 15px; background: rgba(255,255,255,0.15); border-radius: 20px; color: white; font-weight: 600; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }

        .screen-off { position: absolute; width: 100%; height: 100%; background: #000; z-index: 4000; transition: opacity 0.4s; cursor: pointer; opacity: 0; pointer-events: none; }
        .screen-is-off { opacity: 1; pointer-events: auto; }

        .wallpaper { position: absolute; width: 100%; height: 100%; background: #1a3a5a url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover; transition: transform 0.8s var(--ios-spring), filter 0.5s; z-index: 1; transform: scale(1.1); }
        
        .lockscreen { position: absolute; width: 100%; height: 100%; z-index: 3000; display: flex; flex-direction: column; align-items: center; padding-top: 80px; color: white; transition: transform 0.7s var(--ios-spring), opacity 0.4s; }
        .lock-time { font-size: 64px; font-weight: 200; }

        .pin-pad { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); z-index: 3100; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .pin-dots { display: flex; gap: 15px; margin-bottom: 40px; }
        .dot { width: 12px; height: 12px; border: 1.5px solid #fff; border-radius: 50%; }
        .dot.active { background: #fff; transform: scale(1.2); }
        .num-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .num-btn { width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: pointer; }

        .fingerprint-scanner { margin-top: auto; margin-bottom: 100px; width: 70px; height: 70px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%; display: none; justify-content: center; align-items: center; font-size: 32px; animation: pulse 2s infinite; pointer-events: auto; cursor: pointer; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.3); } 70% { box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); } }

        .drag-btn { position: absolute; width: 56px; height: 56px; border-radius: 14px; display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: grab; z-index: 5; opacity: 0; transform: scale(0.5); transition: opacity 0.5s, transform 0.6s var(--ios-spring); }
        .icon-normal-settings { background: linear-gradient(180deg, #5e5e62 0%, #2c2c2e 100%); color: #fff; }
        .icon-normal-cc { background: linear-gradient(180deg, #007aff 0%, #004080 100%); color: #fff; }
        
        #settingsBtn { top: 110px; left: 30px; }
        #ccIconBtn { top: 110px; left: 110px; }

        /* Multitasking */
        .multitasking-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 80; display: none; background: rgba(0,0,0,0.1); }
        .recents-view .multitasking-overlay { display: block; pointer-events: auto; }
        .recents-view .drag-btn { opacity: 0 !important; pointer-events: none !important; }

        .recents-view .app.is-running { 
            display: flex !important;
            opacity: 1 !important;
            left: 50% !important;
            top: 45% !important;
            transform: translate(-50%, -50%) scale(0.65) !important; 
            pointer-events: none !important; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); 
            z-index: 105;
        }
        
        #kill-app-btn {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            width: 44px; height: 44px; background: rgba(255,255,255,0.2); 
            backdrop-filter: blur(10px); border-radius: 50%; color: #ff3b30; font-size: 22px; 
            display: none; justify-content: center; align-items: center; z-index: 120; cursor: pointer;
        }
        .recents-view.has-apps #kill-app-btn { display: flex; }

        #no-apps-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; opacity: 0; z-index: 90; transition: opacity 0.3s; }
        .recents-view:not(.has-apps) #no-apps-msg { opacity: 0.7; }

        .app { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-app); z-index: 100; transform: scale(0); opacity: 0; pointer-events: none; transition: transform var(--spd) var(--ios-spring), opacity 0.3s; display: flex; flex-direction: column; border-radius: 44px; overflow: hidden; }
        .header { padding: 50px 20px 15px; font-weight: 700; font-size: 32px; color: var(--text-main); }
        
        .home-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 5px; background: rgba(255,255,255,0.8); border-radius: 10px; z-index: 3500; cursor: pointer; }

        .is-unlocked .lockscreen { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        .open .app { transform: scale(1) !important; opacity: 1 !important; pointer-events: auto !important; z-index: 1000; left: 0 !important; top: 0 !important; }
    </style>
</head>
<body id="mainBody">

    <div class="phone" id="phone" ondblclick="handleDoubleTap(event)">
        <audio id="sound-unlock" preload="auto">
            <source src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" type="audio/mpeg">
        </audio>
        <audio id="sound-lock" preload="auto">
            <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
        </audio>

        <div class="brightness-overlay"></div>
        <div class="punch-hole"></div>
        
        <div class="multitasking-overlay" onclick="exitRecentsToHome()"></div>
        <div id="no-apps-msg">No Open Apps</div>

        <div class="status-bar">
            <span id="st-time">12:00</span>
            <div class="battery-section" onclick="toggleCC(true)">
                <span id="battery-level">--%</span>
                <span>🔋</span>
            </div>
        </div>

        <div class="control-center" id="ccPanel">
            <div class="cc-btn" onclick="toggleDarkMode()">🌓 Mode: <span id="mode-text">Light</span></div>
            <div class="cc-btn" style="margin-top:10px;" onclick="toggleCC(false)">Done</div>
        </div>

        <div class="screen-off" id="blackOverlay"></div>
        <div class="wallpaper" id="mainWallpaper"></div>
        
        <div class="lockscreen" id="lockView">
            <div class="lock-time" id="clock">12:00</div>
            <div class="fingerprint-scanner" id="fp-icon" style="display:flex;" onclick="unlockPhone()">☝️</div>
        </div>

        <div class="drag-btn icon-normal-settings" id="settingsBtn" onmousedown="setupDrag(event, this, 'settings')" ontouchstart="setupDrag(event, this, 'settings')">⚙️</div>
        
        <div class="app" id="settingsApp">
            <div class="header">Settings</div>
            <div class="item">FakeOS Version 1.1</div>
        </div>
        
        <div id="kill-app-btn" onclick="killApp()">✕</div>
        <div class="home-bar" id="bottomBar" onmousedown="handleHomeStart()" onmouseup="handleHomeEnd()" ontouchstart="handleHomeStart()" ontouchend="handleHomeEnd()"></div>
    </div>

    <script>
        const phone = document.getElementById('phone'), blackOverlay = document.getElementById('blackOverlay');
        const settingsApp = document.getElementById('settingsApp');
        const sUnlock = document.getElementById('sound-unlock');
        const sLock = document.getElementById('sound-lock');

        let isPowerOn = true, homeTimer;

        // Function to play sound and "wake up" audio engine
        function playSfx(audio) {
            audio.pause();
            audio.currentTime = 0;
            // Play returns a promise, we catch errors if the browser blocks it
            audio.play().catch(e => console.log("Audio play blocked: click the screen first."));
        }

        function unlockPhone() {
            if (!phone.classList.contains('is-unlocked')) {
                phone.classList.add('is-unlocked');
                playSfx(sUnlock);
            }
        }

        function handleDoubleTap(e) {
            if (e.target.classList.contains('drag-btn') || e.target.classList.contains('fingerprint-scanner')) return;
            
            if (!isPowerOn) { 
                blackOverlay.classList.remove('screen-is-off'); 
                isPowerOn = true; 
            } 
            else if (phone.classList.contains('is-unlocked') && !phone.classList.contains('open')) { 
                blackOverlay.classList.add('screen-is-off'); 
                phone.classList.remove('is-unlocked'); 
                isPowerOn = false; 
                playSfx(sLock);
            }
        }

        function handleHomeStart() {
            if (isPowerOn && phone.classList.contains('is-unlocked')) {
                homeTimer = setTimeout(() => {
                    phone.classList.add('recents-view');
                    if(settingsApp.classList.contains('is-running')) phone.classList.add('has-apps');
                }, 600);
            }
        }

        function handleHomeEnd() {
            clearTimeout(homeTimer);
            if (!phone.classList.contains('recents-view')) {
                if (!phone.classList.contains('is-unlocked')) unlockPhone();
                else phone.classList.remove('open');
            }
        }

        function killApp() {
            settingsApp.classList.remove('is-running');
            phone.classList.remove('has-apps');
            phone.classList.remove('open');
        }

        function exitRecentsToHome() { phone.classList.remove('recents-view'); }

        function setupDrag(e, el, type) {
            if (!phone.classList.contains('is-unlocked') || phone.classList.contains('open')) return;
            let moved = false;
            const stop = () => { 
                document.removeEventListener('mouseup', stop); 
                document.removeEventListener('touchend', stop);
                if (!moved) { 
                    phone.classList.add('open');
                    settingsApp.classList.add('is-running');
                } 
            };
            document.addEventListener('mouseup', stop);
            document.addEventListener('touchend', stop);
            // Minimal drag detection
            const move = () => { moved = true; };
            document.addEventListener('mousemove', move, {once: true});
            document.addEventListener('touchmove', move, {once: true});
        }

        function updateTime() { 
            const now = new Date(); 
            const t = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0'); 
            document.getElementById('clock').innerText = t; 
            document.getElementById('st-time').innerText = t; 
        }
        setInterval(updateTime, 1000); updateTime();
        function toggleCC(o) { document.getElementById('ccPanel').classList.toggle('cc-open', o); }
        function toggleDarkMode() { document.getElementById('mainBody').classList.toggle('dark-mode'); }
    </script>
</body>
</html>
