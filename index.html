<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyperOS - Fluid Radius Test</title>
    <style>
        :root {
            --phone-width: 300px;
            --phone-height: 620px;
            --icon-radius: 16px;
            /* The 'spring' curve used by high-end mobile OS */
            --fluid-bezier: cubic-bezier(0.32, 0.72, 0, 1); 
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
            background: #0a0a0a; display: flex;
            justify-content: center; align-items: center;
            font-family: 'Inter', sans-serif;
        }

        .power-btn {
            position: absolute; right: -15px; top: 120px;
            width: 5px; height: 50px; background: #333;
            border-radius: 0 4px 4px 0; cursor: pointer; z-index: 200;
        }

        #phone-container {
            width: var(--phone-width); height: var(--phone-height);
            background: #000; border: 10px solid #282828;
            border-radius: 50px; position: relative; overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            transition: opacity 0.4s ease; touch-action: none;
            /* Fixes overflow bleeding on some browsers during animations */
            isolation: isolate; 
        }

        .screen-off { opacity: 0; pointer-events: none; }

        .punch-hole {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 12px; background: #000;
            border: 2px solid #1a1a1a; border-radius: 50%; z-index: 100;
        }

        .layer {
            position: absolute; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: transform 0.6s var(--fluid-bezier);
        }

        #lockscreen {
            background-image: url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=1000&auto=format&fit=crop');
            z-index: 50; display: flex; flex-direction: column; align-items: center;
            padding-top: 70px; color: white;
        }

        #homescreen {
            background-image: url('https://images.unsplash.com/photo-1618005198919-d3d4b5a92ead?q=80&w=1000&auto=format&fit=crop');
            z-index: 40; display: grid; grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(6, 1fr); gap: 15px;
            padding: 50px 20px; box-sizing: border-box;
        }

        .app-icon {
            width: 52px; height: 52px; background: rgba(255,255,255,0.2);
            backdrop-filter: blur(15px); border-radius: var(--icon-radius);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; cursor: pointer; transition: transform 0.1s;
        }

        .app-icon:active { transform: scale(0.9); }

        #app-window {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 60; 
            /* Start with icon's radius and tiny scale */
            transform: scale(0); opacity: 0;
            border-radius: 80px; 
            pointer-events: none;
            transition: 
                transform 0.55s var(--fluid-bezier), 
                opacity 0.25s linear, 
                border-radius 0.55s var(--fluid-bezier);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: white;
            will-change: transform, border-radius;
        }

        #app-window.open {
            transform: scale(1); 
            opacity: 1; 
            border-radius: 0px; /* Expands to full screen corners */
            pointer-events: auto;
        }

        .nav-handle-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60px;
            z-index: 150; display: flex; justify-content: center;
            align-items: flex-end; padding-bottom: 8px; cursor: grab;
        }

        .nav-bar {
            width: 110px; height: 4px; background: rgba(255,255,255,0.7);
            border-radius: 10px; transition: background 0.3s;
        }

        .dark-bar { background: rgba(0,0,0,0.4); }
        .hidden_ls { transform: translateY(-100%); pointer-events: none; }
    </style>
</head>
<body>

    <div style="position: relative;">
        <div class="power-btn" id="pwr-btn"></div>
        <div id="phone-container">
            <div class="punch-hole"></div>
            
            <div id="lockscreen" class="layer">
                <h1 style="font-size: 2.8rem; margin: 0; font-weight: 200;">12:00</h1>
                <p style="opacity: 0.7; font-size: 0.9rem;">Swipe up</p>
            </div>

            <div id="homescreen" class="layer">
                <div class="app-icon" data-name="Photos" data-color="#ff5722">🖼️</div>
                <div class="app-icon" data-name="Weather" data-color="#03a9f4">☁️</div>
                <div class="app-icon" data-name="Chat" data-color="#4caf50">💬</div>
                <div class="app-icon" data-name="Music" data-color="#9c27b0">🎶</div>
            </div>

            <div id="app-window">
                <h2 id="app-title">App</h2>
                <div style="width: 40px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 10px; margin-top: 20px;"></div>
            </div>

            <div class="nav-handle-container" id="nav-trigger">
                <div class="nav-bar" id="visual-bar"></div>
            </div>
        </div>
    </div>

    <script>
        const phone = document.getElementById('phone-container');
        const lockscreen = document.getElementById('lockscreen');
        const appWindow = document.getElementById('app-window');
        const visualBar = document.getElementById('visual-bar');
        const trigger = document.getElementById('nav-trigger');
        const pwrBtn = document.getElementById('pwr-btn');
        
        let isPowerOn = true;
        let startY = 0;
        let isDragging = false;

        // --- INTERRUPTIBLE ANIMATION ENGINE ---
        document.querySelectorAll('.app-icon').forEach(icon => {
            icon.addEventListener('pointerdown', (e) => {
                if (!isPowerOn || !lockscreen.classList.contains('hidden_ls')) return;
                
                // If an app is already opening/open, reset it instantly to allow "re-zoom"
                appWindow.style.transition = 'none';
                appWindow.classList.remove('open');
                
                // Force a reflow to make the 'transition: none' stick
                void appWindow.offsetWidth;

                const name = icon.getAttribute('data-name');
                const color = icon.getAttribute('data-color');
                const rect = icon.getBoundingClientRect();
                const phoneRect = phone.getBoundingClientRect();
                
                const x = ((rect.left + rect.width/2) - phoneRect.left) / phoneRect.width * 100;
                const y = ((rect.top + rect.height/2) - phoneRect.top) / phoneRect.height * 100;
                
                appWindow.style.transformOrigin = `${x}% ${y}%`;
                appWindow.style.backgroundColor = color;
                document.getElementById('app-title').innerText = name;

                // Re-enable transition and trigger the open
                requestAnimationFrame(() => {
                    appWindow.style.transition = ''; 
                    appWindow.classList.add('open');
                });
            });
        });

        // --- SWIPE GESTURE ---
        const startAction = (e) => {
            if (!isPowerOn) return;
            isDragging = true;
            startY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        };

        const moveAction = (e) => {
            if (!isDragging) return;
            const currentY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            const diff = startY - currentY;
            if (diff > 0) {
                visualBar.style.transform = `translateY(-${Math.min(diff/3, 20)}px)`;
            }
        };

        const endAction = (e) => {
            if (!isDragging) return;
            const endY = (e.clientY === undefined) ? e.changedTouches[0].clientY : e.clientY;
            
            if (startY - endY > 50) {
                if (!lockscreen.classList.contains('hidden_ls')) {
                    lockscreen.classList.add('hidden_ls');
                    visualBar.classList.add('dark-bar');
                } else {
                    appWindow.classList.remove('open');
                }
            }
            visualBar.style.transform = `translateY(0)`;
            isDragging = false;
        };

        trigger.addEventListener('pointerdown', startAction);
        window.addEventListener('pointermove', moveAction);
        window.addEventListener('pointerup', endAction);

        // --- POWER SYSTEM ---
        pwrBtn.addEventListener('click', () => {
            if (isPowerOn) {
                appWindow.classList.remove('open');
                lockscreen.classList.remove('hidden_ls');
                phone.classList.add('screen-off');
                visualBar.classList.remove('dark-bar');
                isPowerOn = false;
            } else {
                phone.classList.remove('screen-off');
                isPowerOn = true;
            }
        });
    </script>
</body>
</html>
