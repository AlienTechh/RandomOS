<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CleanOS 1.0 Beta - S8 Edition</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: none; 
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
            transition: filter 0.5s ease;
        }

        /* E-INK MODE STYLES */
        body.eink-mode .phone { filter: grayscale(1) contrast(1.1); }
        #eink-texture {
            position: absolute; inset: 0; pointer-events: none; z-index: 2000;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            opacity: 0; mix-blend-mode: multiply; transition: opacity 0.5s;
        }
        body.eink-mode #eink-texture { opacity: 0.4; }

        .phone-wrapper {
            position: relative;
            padding-right: 12px;
        }

        .phone {
            width: 320px;
            height: 680px;
            background: #000; 
            border-radius: 48px; 
            border: 2px solid #222; 
            position: relative;
            overflow: hidden; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            transition: filter 0.5s ease;
        }

        .top-bezel {
            width: 100%; height: 25px; background: #000;
            display: flex; justify-content: center; align-items: center; z-index: 1000;
            transition: background 0.3s ease;
        }
        .top-bezel.cc-active { background: #141414; }

        .sensor { width: 6px; height: 6px; background: #0a0a0a; border-radius: 50%; margin-left: 10px; }
        .bottom-bezel { width: 100%; height: 25px; background: #000; z-index: 1000; }

        .power-btn {
            position: absolute; right: 0; top: 150px; width: 3px; height: 45px;
            background: #333; border-radius: 0 4px 4px 0; cursor: pointer; z-index: 1001;
        }

        .screen-content {
            flex: 1; 
            width: 100%; 
            position: relative; 
            background: #000;
            transition: opacity 0.25s ease-in-out;
            margin: 0; 
            overflow: hidden;
            border-radius: 40px; 
            -webkit-mask-image: -webkit-radial-gradient(white, black);
        }

        .screen-off { opacity: 0 !important; pointer-events: none !important; }

        /* CONTROL CENTER */
        #control-center {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 100%; 
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 1100;
            transform: translateY(-100%);
            border-radius: 40px; 
            padding: 50px 20px 20px;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #control-center.open { transform: translateY(0); }
        .cc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .cc-tile { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; font-size: 12px; text-align: center; cursor: pointer; transition: background 0.2s, color 0.2s; }
        .cc-tile.active { background: #007aff; }
        
        .cc-tile.lpm-active { background: #ffcc00; color: #000; font-weight: bold; }
        body.low-power #control-center { backdrop-filter: none; -webkit-backdrop-filter: none; background: rgba(15, 15, 15, 0.98); }
        body.low-power #app-drawer { backdrop-filter: none; -webkit-backdrop-filter: none; background: rgba(0, 0, 0, 0.98); }

        #lockscreen {
            position: absolute; inset: 0;
            background: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?q=80&w=2070') center/cover;
            z-index: 1100; display: flex; flex-direction: column;
            align-items: center; justify-content: space-between; padding: 40px 20px 20px;
            transform: translateY(0);
            border-radius: 40px;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #app-drawer {
            position: absolute;
            inset: 0; 
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 700;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 60px 25px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: min-content;
            gap: 20px;
            border-radius: 40px;
        }
        #app-drawer.visible { transform: translateY(0); }

        .app-window {
            position: absolute; inset: 0; background: #fff; z-index: 950;
            opacity: 0; pointer-events: none;
            transform: scale(0);
            border-radius: 40px;
            overflow: hidden;
        }

        .app-window.open { opacity: 1; transform: scale(1); pointer-events: auto; }

        #settings { background: #f2f2f7; color: #000; }
        .settings-header { padding: 50px 20px 10px; font-size: 28px; font-weight: bold; }
        .settings-list { background: #fff; border-top: 1px solid #ddd; margin-top: 20px; }
        .settings-item { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { color: #007aff; cursor: pointer; padding: 10px 20px; font-size: 17px; display: inline-block; }
        .sub-page { position: absolute; inset: 0; background: #f2f2f7; z-index: 10; display: none; }
        .sub-page.active { display: block; }

        /* TOGGLE SWITCH UI */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #34c759; }
        input:checked + .slider:before { transform: translateX(20px); }

        .home-screen {
            width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') center/cover;
            position: relative;
            padding: 50px 25px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            border-radius: 40px;
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.5s;
            transform: scale(0.85);
            opacity: 0;
        }
        
        .home-screen.unlocked { transform: scale(1); opacity: 1; }

        .app-icon { 
            width: 54px; height: 54px; border-radius: 14px; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
            transform: translateY(30px);
            opacity: 0;
        }
        
        .unlocked .app-icon { transform: translateY(0); opacity: 1; }
        .unlocked .app-icon:nth-child(1) { transition-delay: 0.1s; }
        .unlocked .app-icon:nth-child(2) { transition-delay: 0.15s; }
        .unlocked .app-icon:nth-child(3) { transition-delay: 0.2s; }

        .app-icon img { width: 100%; height: 100%; border-radius: 12px; pointer-events: none; -webkit-user-drag: none; }

        .status-bar { 
            position: absolute; top: 0; left: 0; width: 100%; 
            height: 40px; padding: 10px 25px; 
            display: flex; justify-content: space-between; 
            font-size: 11px; font-weight: 600; color: white; 
            z-index: 1200; cursor: ns-resize;
        }
        .gesture-trigger { position: absolute; bottom: 0; left: 0; width: 100%; height: 50px; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 12px; z-index: 1150; }
        .home-bar { width: 80px; height: 4px; background: rgba(255,255,255,0.6); border-radius: 10px; pointer-events: auto; }

        #browser { background: #fff; color: #000; }
        .browser-content { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .browser-none-text { font-size: 48px; font-weight: 900; letter-spacing: -2px; color: #000; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="phone-wrapper">
        <div class="power-btn" onclick="togglePower()"></div>
        <div class="phone">
            <div id="eink-texture"></div>
            <div class="top-bezel" id="top-bezel"><div class="sensor"></div><div class="sensor"></div></div>

            <div class="screen-content" id="screen">
                <div class="status-bar" id="status-bar-trigger">
                    <span id="clock">09:41</span>
                    <span>5G 🔋</span> 
                </div>

                <div id="control-center">
                    <div style="font-weight: bold; font-size: 18px;">Control Center</div>
                    <div class="cc-grid">
                        <div class="cc-tile active">Wi-Fi: On</div>
                        <div class="cc-tile active">Bluetooth</div>
                        <div class="cc-tile">Airplane</div>
                        <div class="cc-tile" style="background: orange;">Flashlight</div>
                        <div class="cc-tile" id="lpm-btn" onclick="toggleLowPower()" style="grid-column: span 2;">Low Power Mode: Off</div>
                    </div>
                </div>

                <div id="lockscreen">
                    <div style="text-align: center; color: white; margin-top: 40px;">
                        <h1 style="font-size: 50px; font-weight: 200; margin:0;" id="lock-clock">09:41</h1>
                        <p style="opacity: 0.8; margin:0;">Friday, Apr 17</p>
                    </div>
                </div>

                <div class="home-screen" id="homescreen-ui">
                    <div class="app-icon" onpointerdown="openApp('settings', this)">
                        <img src="https://img.icons8.com/?size=100&id=a8NHl6SmDbn7&format=png">
                    </div>
                    <div class="app-icon" onpointerdown="openApp('tiktok', this)">
                        <img src="https://img.icons8.com/?size=100&id=118638&format=png">
                    </div>
                    <div class="app-icon" onpointerdown="openApp('browser', this)">
                        <img src="https://cdn-icons-png.flaticon.com/128/1040/1040243.png">
                    </div>

                    <div id="app-drawer">
                        <div class="app-icon" onpointerdown="openApp('settings', this)">
                            <img src="https://img.icons8.com/?size=100&id=a8NHl6SmDbn7&format=png">
                        </div>
                        <div class="app-icon" onpointerdown="openApp('tiktok', this)">
                            <img src="https://img.icons8.com/?size=100&id=118638&format=png">
                        </div>
                        <div class="app-icon" onpointerdown="openApp('browser', this)">
                            <img src="https://cdn-icons-png.flaticon.com/128/1040/1040243.png">
                        </div>
                    </div>
                </div>

                <div id="settings" class="app-window">
                    <div class="settings-header">Settings</div>
                    <div class="settings-list">
                        <div class="settings-item" onclick="showSubPage('screen-settings')"><span>Screen</span><span>›</span></div>
                    </div>
                    <div id="screen-settings" class="sub-page">
                        <div style="padding-top: 40px;"><div class="back-btn" onclick="hideSubPage('screen-settings')">‹ Settings</div></div>
                        <div class="settings-header" style="font-size: 22px;">Display Options</div>
                        <div class="settings-list">
                            <div class="settings-item">
                                <span>E-Ink Mode</span>
                                <label class="switch">
                                    <input type="checkbox" id="eink-toggle" onclick="toggleEInk()">
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="settings-item" onclick="setFPSFromSettings(20)">60Hz (Real 20 FPS)</div>
                            <div class="settings-item" onclick="setFPSFromSettings(60)">120Hz (Real 60 FPS)</div>
                        </div>
                    </div>
                </div>

                <div id="tiktok" class="app-window">
                    <div style="width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;color:#fff;">TikTok Content</div>
                </div>

                <div id="browser" class="app-window">
                    <div class="browser-content"><div class="browser-none-text">NONE</div></div>
                </div>

                <div class="gesture-trigger" id="gesture-area">
                    <div class="home-bar"></div>
                </div>
            </div>

            <div class="bottom-bezel"></div>
        </div>
    </div>

    <script>
        let isPowerOn = true, isUnlocked = false, isDrawerOpen = false, isCCOpen = false;
        let startY = 0, isDragging = false, targetFPS = 20, lastFrameTime = 0;
        let swipeStartedOnStatusBar = false;
        
        let isLowPower = false;
        let isEInk = false;
        let savedFPS = 20;
        
        const screen = document.getElementById('screen');
        const lockscreen = document.getElementById('lockscreen');
        const drawer = document.getElementById('app-drawer');
        const cc = document.getElementById('control-center');
        const statusBar = document.getElementById('status-bar-trigger');
        const gestureArea = document.getElementById('gesture-area');
        const homescreen = document.getElementById('homescreen-ui');
        const topBezel = document.getElementById('top-bezel');
        const lpmBtn = document.getElementById('lpm-btn');

        const originalRAF = window.requestAnimationFrame;
        window.requestAnimationFrame = function(callback) {
            const now = performance.now(), interval = 1000 / targetFPS, delta = now - lastFrameTime;
            if (delta >= interval) {
                lastFrameTime = now - (delta % interval);
                return originalRAF(callback);
            } else {
                return originalRAF(() => window.requestAnimationFrame(callback));
            }
        };

        function setFPS(fps) {
            targetFPS = fps;
            let stepSetting = "cubic-bezier(0.19, 1, 0.22, 1)";
            if (fps === 20) stepSetting = "steps(10)";
            if (fps === 10) stepSetting = "steps(5)";
            if (fps === 4) stepSetting = "steps(2)"; // Real choppy for E-Ink

            const appWindows = document.querySelectorAll('.app-window');
            appWindows.forEach(w => w.style.transition = `transform 0.4s ${stepSetting}, opacity 0.25s`);
            drawer.style.transition = `transform 0.4s ${stepSetting}`;
            cc.style.transition = `transform 0.4s ${stepSetting}`;
            lockscreen.style.transition = `transform 0.4s ${stepSetting}`;
            homescreen.style.transition = `transform 0.5s ${stepSetting}, opacity 0.5s`;
        }

        function setFPSFromSettings(fps) {
            if (isLowPower) toggleLowPower();
            if (isEInk) toggleEInk(); // Turn off E-Ink if they pick a standard rate
            savedFPS = fps;
            setFPS(fps);
        }

        function toggleEInk() {
            isEInk = !isEInk;
            document.body.classList.toggle('eink-mode', isEInk);
            const toggleInput = document.getElementById('eink-toggle');
            toggleInput.checked = isEInk;

            if (isEInk) {
                savedFPS = targetFPS;
                setFPS(4); // Simulated slow E-Ink refresh
            } else {
                setFPS(savedFPS);
            }
        }

        function toggleLowPower() {
            isLowPower = !isLowPower;
            if (isLowPower) {
                savedFPS = targetFPS;
                setFPS(10);
                document.body.classList.add('low-power');
                lpmBtn.classList.add('lpm-active');
                lpmBtn.innerText = "Low Power Mode: On";
            } else {
                setFPS(savedFPS);
                document.body.classList.remove('low-power');
                lpmBtn.classList.remove('lpm-active');
                lpmBtn.innerText = "Low Power Mode: Off";
            }
        }

        function openApp(id, iconElement) { 
            const app = document.getElementById(id), iconRect = iconElement.getBoundingClientRect(), screenRect = screen.getBoundingClientRect();
            app.style.transformOrigin = `${(iconRect.left + iconRect.width / 2) - screenRect.left}px ${(iconRect.top + iconRect.height / 2) - screenRect.top}px`;
            app.classList.add('open');
        }

        function goHome() { 
            document.querySelectorAll('.app-window').forEach(w => w.classList.remove('open'));
            drawer.classList.remove('visible');
            isDrawerOpen = false;
        }

        const handleStart = (e) => {
            if (!isPowerOn) return;
            isDragging = true;
            startY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            swipeStartedOnStatusBar = (e.currentTarget === statusBar);
            if (!isUnlocked) {
                lockscreen.style.transition = 'none';
                homescreen.style.transition = 'none';
            }
        };

        const handleMove = (e) => {
            if (!isDragging) return;
            const currentY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            const diff = startY - currentY;

            if (!isUnlocked && diff > 0) {
                lockscreen.style.transform = `translateY(${-diff}px)`;
                let progress = Math.min(diff / 400, 1);
                homescreen.style.opacity = progress;
                homescreen.style.transform = `scale(${0.85 + (progress * 0.15)})`;
            }
        };

        const handleEnd = (e) => {
            if (!isDragging) return;
            isDragging = false;
            const endY = e.clientY || (e.changedTouches ? e.changedTouches[0].clientY : startY);
            const diff = startY - endY;

            let stepSetting = "cubic-bezier(0.19, 1, 0.22, 1)";
            if (targetFPS === 20) stepSetting = "steps(10)";
            if (targetFPS === 10) stepSetting = "steps(5)";
            if (targetFPS === 4) stepSetting = "steps(2)";

            lockscreen.style.transition = `transform 0.4s ${stepSetting}`;
            homescreen.style.transition = `transform 0.5s ${stepSetting}, opacity 0.5s`;

            if (swipeStartedOnStatusBar && diff < -50 && isUnlocked) {
                cc.classList.add('open');
                topBezel.classList.add('cc-active');
                isCCOpen = true;
                return;
            } 
            if (diff > 50 && isCCOpen) {
                cc.classList.remove('open');
                topBezel.classList.remove('cc-active');
                isCCOpen = false;
                return;
            }

            if (!isUnlocked) {
                if (diff > 120) { 
                    lockscreen.style.transform = 'translateY(-100%)'; 
                    isUnlocked = true; 
                    homescreen.classList.add('unlocked');
                    homescreen.style.opacity = "1";
                    homescreen.style.transform = "scale(1)";
                } else { 
                    lockscreen.style.transform = 'translateY(0)'; 
                    homescreen.style.opacity = "0";
                    homescreen.style.transform = "scale(0.85)";
                }
            } else {
                if (diff > 50 && document.querySelector('.app-window.open')) goHome();
                else if (diff > 60 && !isDrawerOpen) { drawer.classList.add('visible'); isDrawerOpen = true; }
                else if (diff < -60 && isDrawerOpen) { drawer.classList.remove('visible'); isDrawerOpen = false; }
            }
            swipeStartedOnStatusBar = false;
        };

        window.addEventListener('pointermove', handleMove);
        window.addEventListener('pointerup', handleEnd);
        homescreen.addEventListener('pointerdown', handleStart);
        gestureArea.addEventListener('pointerdown', handleStart);
        statusBar.addEventListener('pointerdown', handleStart);

        function showSubPage(id) { document.getElementById(id).classList.add('active'); }
        function hideSubPage(id) { document.getElementById(id).classList.remove('active'); }

        function togglePower() {
            isPowerOn = !isPowerOn;
            screen.classList.toggle('screen-off', !isPowerOn);
            if (isPowerOn) { 
                isUnlocked = false; 
                homescreen.classList.remove('unlocked');
                lockscreen.style.transform = 'translateY(0)'; 
                homescreen.style.opacity = "0";
                homescreen.style.transform = "scale(0.85)";
                cc.classList.remove('open'); 
                topBezel.classList.remove('cc-active');
                isCCOpen = false; 
                goHome(); 
            }
        }

        function updateTime() {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('clock').innerText = time;
            document.getElementById('lock-clock').innerText = time;
        }
        
        setInterval(updateTime, 1000); updateTime(); setFPS(20);
    </script>
</body>
</html>
