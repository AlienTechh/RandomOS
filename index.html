<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaOS V12 | Pro Edition</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body { 
            background: #121212; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        .phone {
            width: 300px;
            height: 620px;
            background: #000;
            border: 10px solid #222;
            border-radius: 45px;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .screen-container {
            width: 100%;
            height: 100%;
            border-radius: 35px;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        /* STATUS BAR */
        .status-bar {
            position: absolute;
            top: 0;
            width: 100%;
            height: 35px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 4500;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-right { display: flex; align-items: center; gap: 5px; }
        .battery-icon {
            width: 20px;
            height: 10px;
            border: 1px solid white;
            border-radius: 2px;
            position: relative;
        }
        .battery-icon::after {
            content: '';
            position: absolute;
            right: -3px; top: 2px;
            width: 2px; height: 4px;
            background: white;
        }
        .battery-level {
            position: absolute;
            left: 1px; top: 1px;
            height: 6px; width: 80%;
            background: white;
        }

        .punch-hole {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 18px;
            background: #000;
            border-radius: 50%;
            z-index: 5000;
        }

        .power-btn {
            position: absolute;
            right: -15px;
            top: 120px;
            width: 8px;
            height: 50px;
            background: #ff3b30;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            z-index: 5500;
        }

        /* BRIGHTNESS & FLASH OVERLAYS */
        #brightness-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black; opacity: 0; pointer-events: none; z-index: 4000;
        }

        #flashlight-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 4100;
            transition: opacity 0.2s;
        }

        #black-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 5500;
            display: none;
        }

        /* CONTROL CENTER */
        #control-center {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(25px);
            z-index: 4800;
            transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            padding: 60px 20px;
            display: flex; flex-direction: column; gap: 20px;
        }
        #control-center.open { transform: translateY(0); }

        .cc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .cc-btn {
            background: rgba(255,255,255,0.1);
            padding: 15px; border-radius: 18px;
            color: white; font-size: 0.8rem;
            display: flex; align-items: center; gap: 10px;
            cursor: pointer;
        }
        .cc-btn.active { background: #007aff; }

        .cc-slider {
            background: rgba(255,255,255,0.1);
            padding: 20px; border-radius: 20px; color: white;
        }
        .cc-slider input { width: 100%; margin-top: 10px; cursor: pointer; }

        .cc-close-trigger {
            flex-grow: 1; display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 20px; color: rgba(255,255,255,0.4); font-size: 1.5rem;
        }

        .status-trigger {
            position: absolute; top: 0; right: 0; width: 40%; height: 40px;
            z-index: 4600; cursor: pointer;
        }

        /* WALLPAPER LAYER */
        .wallpaper {
            position: absolute;
            width: 100%; height: 100%;
            background-image: url('1000005643.jpg');
            background-size: cover; background-position: center;
            transition: filter 0.5s ease, transform 0.5s ease;
            z-index: 1;
        }
        .wallpaper.app-active { filter: blur(15px); transform: scale(1.15); }

        .screen {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 5;
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }
        .active { opacity: 1; pointer-events: all; transform: scale(1); }

        #lock-screen {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
        }
        .time { font-size: 3.5rem; font-weight: 300; }
        .date { font-size: 1rem; margin-top: -5px; opacity: 0.9; }

        #home-screen { padding: 60px 15px; }
        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .app { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .icon {
            width: 50px; height: 50px; border-radius: 14px; margin-bottom: 5px;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .app span { color: white; font-size: 0.65rem; font-weight: 500; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }

        .app-window {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f2f2f7; z-index: 1000;
            opacity: 0; transform: scale(0.1); 
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s;
            padding: 60px 20px;
        }
        .app-window.open { opacity: 1; transform: scale(1); pointer-events: all; }

        .settings-item {
            background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            color: #000; font-weight: 500; cursor: pointer;
        }

        .back-btn { color: #007aff; font-weight: 600; margin-bottom: 20px; cursor: pointer; }

        #home-bar {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 110px; height: 5px; background: rgba(255,255,255,0.7);
            border-radius: 10px; z-index: 5600; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="phone">
        <div class="power-btn" onclick="togglePower()"></div>

        <div class="screen-container">
            <div class="status-bar">
                <div id="status-time">00:00</div>
                <div class="status-right">
                    <span>LTE</span>
                    <div class="battery-icon"><div class="battery-level"></div></div>
                </div>
            </div>

            <div class="status-trigger" onclick="toggleCC(true)"></div>
            <div class="punch-hole"></div>
            
            <div id="black-overlay"></div>
            <div id="brightness-overlay"></div>
            <div id="flashlight-overlay"></div>
            
            <div class="wallpaper" id="main-wallpaper"></div>

            <div id="control-center">
                <div class="cc-grid">
                    <div class="cc-btn" id="wifi-btn" onclick="toggleCCBtn('wifi-btn')">📶 Wi-Fi</div>
                    <div class="cc-btn" id="bt-btn" onclick="toggleCCBtn('bt-btn')">🔹 Bluetooth</div>
                    <div class="cc-btn" id="flash-btn" onclick="toggleFlash()">🔦 Flash</div>
                    <div class="cc-btn" onclick="location.reload()">🔄 Refresh</div>
                </div>
                <div class="cc-slider">
                    <label style="font-size: 0.8rem;">Brightness</label>
                    <input type="range" min="0" max="100" value="100" oninput="adjustBrightness(this.value)">
                </div>
                <div class="cc-close-trigger" onclick="toggleCC(false)">︿</div>
            </div>

            <div id="lock-screen" class="screen active">
                <div class="time" id="clock-large">00:00</div>
                <div class="date">Friday, April 10</div>
            </div>

            <div id="home-screen" class="screen hidden">
                <div class="app-grid">
                    <div class="app" onclick="openApp('settings-main')">
                        <div class="icon" style="background: #ffffff;">⚙️</div>
                        <span>Settings</span>
                    </div>
                </div>
            </div>

            <div id="settings-main" class="app-window">
                <h2 style="margin-bottom: 25px;">Settings</h2>
                <div class="settings-item" onclick="showSubPage('customization-page')">
                    <span>Customization</span>
                    <span>></span>
                </div>
            </div>

            <div id="customization-page" class="app-window">
                <div class="back-btn" onclick="showSubPage('settings-main')"> < Back</div>
                <h2 style="margin-bottom: 25px;">Customization</h2>
                <div class="settings-item" onclick="triggerFileSelect()">
                    <span>Choose Wallpaper</span>
                </div>
            </div>

            <div id="home-bar" onclick="handleBarClick()"></div>
        </div>
    </div>

    <input type="file" id="wallpaper-input" hidden accept="image/*">

    <script>
        let isPhoneOff = false;
        let isFlashOn = false;
        const wallpaperLayer = document.getElementById('main-wallpaper');
        const wallpaperInput = document.getElementById('wallpaper-input');

        function toggleCC(show) {
            if (isPhoneOff) return;
            document.getElementById('control-center').classList.toggle('open', show);
        }

        function toggleCCBtn(id) {
            document.getElementById(id).classList.toggle('active');
        }

        function toggleFlash() {
            isFlashOn = !isFlashOn;
            document.getElementById('flash-btn').classList.toggle('active');
            document.getElementById('flashlight-overlay').style.opacity = isFlashOn ? '0.8' : '0';
        }

        function adjustBrightness(val) {
            // val 100 = 0% darkness, val 0 = 80% darkness
            const darkness = (100 - val) / 125; 
            document.getElementById('brightness-overlay').style.opacity = darkness;
        }

        function handleBarClick() {
            if (isPhoneOff) return;
            toggleCC(false);
            const lockScreen = document.getElementById('lock-screen');
            if (lockScreen.classList.contains('active')) {
                lockScreen.classList.replace('active', 'hidden');
                document.getElementById('home-screen').classList.replace('hidden', 'active');
            } else {
                closeAllApps();
            }
        }

        function openApp(id) {
            document.getElementById(id).classList.add('open');
            wallpaperLayer.classList.add('app-active');
        }

        function closeAllApps() {
            document.querySelectorAll('.app-window').forEach(win => win.classList.remove('open'));
            document.getElementById('home-screen').classList.replace('hidden', 'active');
            wallpaperLayer.classList.remove('app-active');
        }

        function showSubPage(id) {
            document.querySelectorAll('.app-window').forEach(win => win.classList.remove('open'));
            document.getElementById(id).classList.add('open');
        }

        function triggerFileSelect() { wallpaperInput.click(); }

        wallpaperInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    wallpaperLayer.style.backgroundImage = `url(${e.target.result})`;
                };
                reader.readAsDataURL(file);
            }
        });

        function togglePower() {
            isPhoneOff = !isPhoneOff;
            document.getElementById('black-overlay').style.display = isPhoneOff ? 'block' : 'none';
            document.getElementById('home-bar').style.display = isPhoneOff ? 'none' : 'block';
            toggleCC(false);
            if (!isPhoneOff) {
                closeAllApps();
                document.getElementById('home-screen').classList.replace('active', 'hidden');
                document.getElementById('lock-screen').classList.replace('hidden', 'active');
            }
        }

        function updateTime() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock-large').innerText = timeStr;
            document.getElementById('status-time').innerText = timeStr;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
