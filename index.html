<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyperOS Pro - Perfect Scale & Bezels</title>
    <style>
        :root {
            --phone-width: 350px; 
            --phone-height: 700px;
            --icon-radius: 14px;
            --fluid-bezier: cubic-bezier(0.25, 1, 0.3, 1);
            --anim-speed: 0.85s; 
            --glass: rgba(255, 255, 255, 0.15);
            --inner-radius: 32px;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
            background: #0f0f0f; display: flex;
            justify-content: center; align-items: center;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        #phone-wrapper {
            width: var(--phone-width);
            height: var(--phone-height);
            position: relative;
            background-image: url('https://static.thenounproject.com/png/4064637-200.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center; align-items: center;
        }

        .power-btn {
            position: absolute; right: 10px; top: 160px;
            width: 4px; height: 55px; background: #222;
            border-radius: 0 4px 4px 0; cursor: pointer; z-index: 200;
        }

        /* FIXED BEZELS: Moved here so they stay visible when display is off */
        #phone-container {
            width: 87.5%; 
            height: 93.8%;
            background: #000;
            border-radius: var(--inner-radius);
            position: relative;
            overflow: hidden;
            touch-action: none;
            isolation: isolate;
            box-shadow: inset 0 0 0 4px #000, inset 0 0 15px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.05);
        }

        #display-content { width: 100%; height: 100%; transition: opacity 0.4s ease; }
        .screen-off { opacity: 0; pointer-events: none; }

        .punch-hole {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            width: 14px; height: 14px; background: #000; border-radius: 50%; z-index: 100;
        }

        .status-bar {
            position: absolute; top: 14px; width: 100%;
            padding: 0 25px; display: flex; justify-content: space-between;
            color: white; font-size: 10px; font-weight: 500; z-index: 90; box-sizing: border-box;
        }

        .wallpaper-container {
            position: absolute; width: 100%; height: 100%;
            background: #000; overflow: hidden;
        }
        
        #homescreen-wall {
            width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1635776062127-d379bfcba9f8?auto=format&fit=crop&q=80&w=600');
            background-size: cover; background-position: center;
            transition: transform var(--anim-speed) var(--fluid-bezier), filter var(--anim-speed) var(--fluid-bezier);
            transform: scale(1);
        }

        .app-open-active #homescreen-wall {
            transform: scale(1.18);
            filter: blur(20px) brightness(0.7);
        }

        .layer {
            position: absolute; width: 100%; height: 100%;
            transition: transform var(--anim-speed) var(--fluid-bezier), opacity 0.5s ease;
        }

        #lockscreen {
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=600');
            background-size: cover; background-position: center;
            z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }

        .unlocked-anim { transform: scale(1.4) !important; opacity: 0 !important; pointer-events: none; }

        #homescreen { z-index: 40; padding: 60px 20px; box-sizing: border-box; }
        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }

        .dock {
            position: absolute; bottom: 18px; left: 15px; right: 15px;
            height: 65px; background: rgba(255,255,255,0.12);
            backdrop-filter: blur(25px); border-radius: 24px;
            display: flex; justify-content: space-evenly; align-items: center;
        }

        .app-icon {
            width: 52px; height: 52px; background: var(--glass);
            border-radius: var(--icon-radius);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; box-sizing: border-box;
        }

        /* FIXED: Messages Icon Scale and Background */
        .app-icon.msg-special { 
            background: #fff; 
            padding: 13px; /* More padding to shrink the logo */
        }
        .app-icon img { width: 100%; height: 100%; object-fit: contain; }
        .app-icon:active { transform: scale(0.85); }
        .app-label { color: white; font-size: 10px; margin-top: 5px; text-align: center; }

        #app-window {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 60; transform: scale(0); opacity: 0;
            border-radius: 80px; pointer-events: none;
            transition: transform var(--anim-speed) var(--fluid-bezier), opacity 0.3s ease, border-radius var(--anim-speed) var(--fluid-bezier);
            overflow: hidden; background: #fff;
        }

        #app-window.open { transform: scale(1); opacity: 1; border-radius: var(--inner-radius); pointer-events: auto; }

        .nav-handle-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 40px;
            z-index: 150; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 10px;
        }
        .nav-bar { width: 90px; height: 4px; background: rgba(255,255,255,0.5); border-radius: 10px; }
        .dark-bar { background: rgba(0,0,0,0.25); }
    </style>
</head>
<body>

    <div id="phone-wrapper">
        <div class="power-btn" id="pwr-btn"></div>
        <div id="phone-container">
            <div id="display-content">
                <div class="punch-hole"></div>
                <div class="status-bar"><span>09:41</span><span>📶 🔋</span></div>
                
                <div id="lockscreen" class="layer">
                    <h1 style="font-size: 3.2rem; margin: 0; font-weight: 200;">09:41</h1>
                </div>

                <div id="homescreen" class="layer">
                    <div class="wallpaper-container" style="position: absolute; top:0; left:0; z-index:-1;">
                        <div id="homescreen-wall"></div>
                    </div>

                    <div class="app-grid">
                        <div style="display:flex; flex-direction:column; align-items:center;">
                            <div class="app-icon" data-name="Settings"><img src="https://hyperosupdates.com/wp-content/themes/miuidownload/icons/com.android.settings.webp"></div>
                            <span class="app-label">Settings</span>
                        </div>
                        <div style="display:flex; flex-direction:column; align-items:center;">
                            <div class="app-icon" data-name="Gallery"><img src="https://hyperosupdates.com/wp-content/themes/miuidownload/icons/com.miui.gallery.webp"></div>
                            <span class="app-label">Gallery</span>
                        </div>
                    </div>

                    <div class="dock">
                        <div class="app-icon" data-name="Phone"><img src="https://play-lh.googleusercontent.com/bk3e0glVbvRC4Z0uEZ5Oso5wjS89r1P_X5e-k3N_UBkTPXZLhGv50rRy7LAuDzzC9w=w240-h480-rw"></div>
                        <div class="app-icon msg-special" data-name="Messages"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Google_Messages_icon_%282022%29.svg/250px-Google_Messages_icon_%282022%29.svg.png"></div>
                        <div class="app-icon" data-name="Browser"><img src="https://downloadr2.apkmirror.com/wp-content/uploads/2020/07/79/5f06abb0c532a.png"></div>
                        <div class="app-icon" data-name="Camera"><img src="https://hyperosupdates.com/wp-content/themes/miuidownload/icons/com.android.camera.webp"></div>
                    </div>
                </div>

                <div id="app-window">
                    <div id="app-content" style="padding: 70px 25px; color:#000;">
                        <h2 id="app-title">Settings</h2>
                        <p>Refined animations and permanent bezels.</p>
                    </div>
                </div>

                <div class="nav-handle-container" id="nav-trigger">
                    <div class="nav-bar" id="visual-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const lockscreen = document.getElementById('lockscreen');
        const appWindow = document.getElementById('app-window');
        const visualBar = document.getElementById('visual-bar');
        const trigger = document.getElementById('nav-trigger');
        const pwrBtn = document.getElementById('pwr-btn');
        const phone = document.getElementById('phone-container');
        const display = document.getElementById('display-content');
        
        let isPowerOn = true;
        let startY = 0;
        let isDragging = false;

        document.querySelectorAll('.app-icon').forEach(icon => {
            icon.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                if (!isPowerOn || !lockscreen.classList.contains('unlocked-anim')) return;
                
                appWindow.style.transition = 'none';
                appWindow.classList.remove('open');
                phone.classList.remove('app-open-active');
                void appWindow.offsetWidth;

                const name = icon.getAttribute('data-name');
                const rect = icon.getBoundingClientRect();
                const phoneRect = phone.getBoundingClientRect();
                
                const x = ((rect.left + rect.width/2) - phoneRect.left) / phoneRect.width * 100;
                const y = ((rect.top + rect.height/2) - phoneRect.top) / phoneRect.height * 100;
                
                appWindow.style.transformOrigin = `${x}% ${y}%`;
                document.getElementById('app-title').innerText = name;

                requestAnimationFrame(() => {
                    appWindow.style.transition = ''; 
                    appWindow.classList.add('open');
                    phone.classList.add('app-open-active');
                });
            });
        });

        trigger.addEventListener('pointerdown', (e) => { if (isPowerOn) { isDragging = true; startY = e.clientY; } });

        window.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            if (startY - e.clientY > 60) {
                if (!lockscreen.classList.contains('unlocked-anim')) {
                    lockscreen.classList.add('unlocked-anim');
                    visualBar.classList.add('dark-bar');
                } else {
                    appWindow.classList.remove('open');
                    phone.classList.remove('app-open-active');
                }
            }
            isDragging = false;
        });

        pwrBtn.addEventListener('click', () => {
            if (isPowerOn) {
                appWindow.classList.remove('open');
                phone.classList.remove('app-open-active');
                lockscreen.classList.remove('unlocked-anim');
                display.classList.add('screen-off');
                visualBar.classList.remove('dark-bar');
                isPowerOn = false;
            } else {
                display.classList.remove('screen-off');
                isPowerOn = true;
            }
        });
    </script>
</body>
</html>
