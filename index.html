<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RandomOS 1.0 Beta</title>
    <style>
        /* 1. RESET & NATIVE FEEL */
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: none; 
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* 2. THE HARDWARE */
        .phone-wrapper {
            position: relative;
            padding-right: 12px;
        }

        .phone {
            width: 320px;
            height: 660px;
            background: #111; 
            border-radius: 40px;
            border: 8px solid #333; 
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }

        .punch-hole {
            position: absolute;
            top: 15px;
            right: 25px;
            width: 14px;
            height: 14px;
            background: #000;
            border-radius: 50%;
            z-index: 1000;
        }

        .power-btn {
            position: absolute;
            right: 0;
            top: 120px;
            width: 4px;
            height: 45px;
            background: #444;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            z-index: 1001;
        }

        /* 3. SCREEN CONTENT & STATES */
        .screen-content {
            width: 100%;
            height: 100%;
            transition: opacity 0.1s ease; /* Faster screen toggle */
            position: relative;
            background: #000;
        }

        .power-off .screen-content {
            opacity: 0;
            pointer-events: none;
        }

        #lockscreen {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?q=80&w=2070') center/cover;
            z-index: 800;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 80px 20px 20px;
            /* Ultra-fast unlock swipe */
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        #lockscreen.unlocked {
            transform: translateY(-100%);
            pointer-events: none;
        }

        /* 4. HOME SCREEN & APPS */
        .home-grid {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') center/cover;
            padding: 70px 25px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .app-icon {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.1s active; /* Instant visual feedback */
        }

        .app-icon:active {
            transform: scale(0.9);
        }

        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 5. SMOOTHNESS TEST ANIMATION (FAST) */
        .app-window {
            position: absolute;
            inset: 0;
            background: #fff;
            z-index: 400;
            border-radius: 32px;
            opacity: 0;
            pointer-events: none;
            transform-origin: 20% 15%; 
            transform: scale(0);
            /* Speed bumped to 0.2s for "Fast" test */
            transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.1s;
        }

        .app-window.open {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        /* 6. UI ELEMENTS */
        .status-bar {
            position: absolute;
            top: 15px;
            width: 100%;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 600;
            color: white;
            z-index: 600;
        }

        .home-bar {
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.8);
            border-radius: 10px;
        }

        .app-home-trigger {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 700;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="power-btn" onclick="togglePower()"></div>

        <div class="phone" id="device">
            <div class="punch-hole"></div>

            <div class="screen-content">
                <div class="status-bar">
                    <span id="clock">09:41</span>
                    <span style="margin-right: 25px;">5G 🔋</span> 
                </div>

                <div id="lockscreen">
                    <div style="text-align: center; color: white;">
                        <h1 style="font-size: 50px; font-weight: 200; margin:0;" id="lock-clock">09:41</h1>
                        <p style="opacity: 0.8; margin:0;">Thursday, Apr 16</p>
                    </div>
                    <div class="home-bar" id="swipe-bar"></div>
                </div>

                <div class="home-grid">
                    <div class="app-icon" onmousedown="openApp('settings')" ontouchstart="openApp('settings')">
                        <img src="https://img.icons8.com/?size=100&id=a8NHl6SmDbn7&format=png&color=000000" alt="Settings">
                    </div>
                </div>

                <div id="settings" class="app-window"></div>

                <div class="app-home-trigger" id="home-trigger">
                    <div class="home-bar" style="background: rgba(255,255,255,0.3);"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isPowerOn = true;
        let startY = 0;

        const swipeBar = document.getElementById('swipe-bar');
        const homeTrigger = document.getElementById('home-trigger');

        // Fast Event Handlers
        const startSwipe = (e) => {
            startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        };

        const endSwipeUnlock = (e) => {
            let endY = e.type.includes('touch') ? e.changedTouches[0].clientY : e.clientY;
            if (startY - endY > 40) unlock();
        };

        const endSwipeHome = (e) => {
            let endY = e.type.includes('touch') ? e.changedTouches[0].clientY : e.clientY;
            if (startY - endY > 30) goHome();
        };

        swipeBar.addEventListener('mousedown', startSwipe);
        window.addEventListener('mouseup', (e) => { if(startY) endSwipeUnlock(e); startY = 0; });
        swipeBar.addEventListener('touchstart', startSwipe);
        window.addEventListener('touchend', endSwipeUnlock);

        homeTrigger.addEventListener('mousedown', startSwipe);
        window.addEventListener('mouseup', (e) => { if(startY) endSwipeHome(e); startY = 0; });
        homeTrigger.addEventListener('touchstart', startSwipe);
        window.addEventListener('touchend', endSwipeHome);

        function togglePower() {
            const device = document.getElementById('device');
            const lock = document.getElementById('lockscreen');
            if (isPowerOn) {
                device.classList.add('power-off');
                isPowerOn = false;
            } else {
                device.classList.remove('power-off');
                lock.classList.remove('unlocked'); 
                goHome(); 
                isPowerOn = true;
            }
        }

        function unlock() {
            document.getElementById('lockscreen').classList.add('unlocked');
        }

        function openApp(id) {
            // Instant class toggle
            document.getElementById(id).classList.add('open');
        }

        function goHome() {
            document.querySelectorAll('.app-window').forEach(w => w.classList.remove('open'));
        }

        function updateTime() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + 
                         now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = time;
            document.getElementById('lock-clock').innerText = time;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
