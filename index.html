<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CleanOS 1.0 Beta</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: none; 
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
        }

        .phone-wrapper {
            position: relative;
            padding-right: 12px;
        }

        /* Real Bezels Styling (S8 Style) */
        .phone {
            width: 320px;
            height: 660px;
            background: #000; 
            border-radius: 45px;
            border: 4px solid #222; 
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }

        /* Top Bezel / Notch Area */
        .top-bezel {
            width: 100%;
            height: 45px;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1000;
        }

        .speaker {
            width: 40px;
            height: 4px;
            background: #222;
            border-radius: 2px;
        }

        .sensor {
            width: 6px;
            height: 6px;
            background: #111;
            border-radius: 50%;
            margin-left: 10px;
        }

        /* Bottom Bezel */
        .bottom-bezel {
            width: 100%;
            height: 45px;
            background: #000;
            z-index: 1000;
        }

        .power-btn {
            position: absolute;
            right: 0;
            top: 140px;
            width: 4px;
            height: 45px;
            background: #333;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            z-index: 1001;
        }

        .screen-content {
            flex: 1;
            width: 100%;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        #lockscreen {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?q=80&w=2070') center/cover;
            z-index: 800;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px 20px;
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #lockscreen.unlocked {
            transform: translateY(-100%);
            pointer-events: none;
        }

        .home-grid {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') center/cover;
            padding: 30px 25px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .app-icon {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }

        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .app-window {
            position: absolute;
            inset: 0;
            background: #fff;
            z-index: 400;
            border-radius: 0px; /* Apps fill the screen area between bezels */
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            overflow: hidden;
        }

        .app-window.open {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        #settings { transform-origin: center; background: #f2f2f7; padding: 40px 20px; }
        
        /* TikTok Image Styling */
        #tiktok { 
            transform-origin: center; 
            background: #000; 
        }

        .image-container {
            width: 100%;
            height: 100%;
            background: url('https://photo-cdn2.icons8.com/u6Kq-Mztr6T6ndoFGgWU8u9KCkCVpR5PrUAwGE4VhoQ/rs:fit:1606:1072/wm:1:re:0:0:0.65/wmid:moose/q:98/czM6Ly9pY29uczgu/bW9vc2UtcHJvZC5h/c3NldHMvYXNzZXRz/L3NhdGEvb3JpZ2lu/YWwvNjA1L2Q2MmFi/YTFmLWVhNzEtNDlk/ZC04MDRhLTU2OTVh/MzA4M2IyYi5qcGc.jpg') center/cover;
            position: relative;
        }

        .tiktok-ui-overlay {
            position: absolute;
            bottom: 40px;
            left: 15px;
            color: white;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }

        .status-bar {
            position: absolute;
            top: 5px;
            width: 100%;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 600;
            color: white;
            z-index: 600;
        }

        .home-bar {
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.8);
            border-radius: 10px;
        }

        .app-home-trigger {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 40px; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 700;
            cursor: ns-resize;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="power-btn" onclick="togglePower()"></div>
        <div class="phone" id="device">
            <div class="top-bezel">
                <div class="sensor"></div>
                <div class="speaker"></div>
                <div class="sensor" style="background: #001a33; border: 1px solid #003366;"></div>
            </div>

            <div class="screen-content">
                <div class="status-bar">
                    <span id="clock">09:41</span>
                    <span>5G 🔋</span> 
                </div>

                <div id="lockscreen">
                    <div style="text-align: center; color: white;">
                        <h1 style="font-size: 50px; font-weight: 200; margin:0;" id="lock-clock">09:41</h1>
                        <p style="opacity: 0.8; margin:0;">Thursday, Apr 16</p>
                    </div>
                    <div class="home-bar" id="lock-bar"></div>
                </div>

                <div class="home-grid">
                    <div class="app-icon" onpointerdown="openApp('settings')">
                        <img src="https://img.icons8.com/?size=100&id=a8NHl6SmDbn7&format=png&color=000000" alt="Settings">
                    </div>
                    <div class="app-icon" onpointerdown="openApp('tiktok')">
                        <img src="https://img.icons8.com/?size=100&id=118638&format=png&color=000000" alt="TikTok">
                    </div>
                </div>

                <div id="settings" class="app-window">
                    <h2 style="margin: 20px;">Settings</h2>
                    <p style="margin: 20px;">CleanOS v1.0 Beta</p>
                </div>

                <div id="tiktok" class="app-window">
                    <div class="image-container">
                        <div class="tiktok-ui-overlay">
                            @CleanOS_User<br>
                            <span style="font-weight: normal; font-size: 12px;">The future is Clean. #CleanOS #Tech</span>
                        </div>
                    </div>
                </div>

                <div class="app-home-trigger" id="home-trigger">
                    <div class="home-bar" style="background: rgba(255,255,255,0.3);"></div>
                </div>
            </div>

            <div class="bottom-bezel"></div>
        </div>
    </div>

    <script>
        let isPowerOn = true;
        let startY = 0;
        let activeAction = null; 

        const lockscreen = document.getElementById('lockscreen');
        const lockBar = document.getElementById('lock-bar');
        const homeTrigger = document.getElementById('home-trigger');

        const handleStart = (e, action) => {
            startY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            activeAction = action;
        };

        const handleEnd = (e) => {
            if (!startY) return;
            const endY = e.clientY || (e.changedTouches ? e.changedTouches[0].clientY : startY);
            if (startY - endY > 50) { 
                if (activeAction === 'unlock') unlock();
                else if (activeAction === 'home') goHome();
            }
            startY = 0;
            activeAction = null;
        };

        lockBar.addEventListener('mousedown', (e) => handleStart(e, 'unlock'));
        lockBar.addEventListener('touchstart', (e) => handleStart(e, 'unlock'));
        homeTrigger.addEventListener('mousedown', (e) => handleStart(e, 'home'));
        homeTrigger.addEventListener('touchstart', (e) => handleStart(e, 'home'));

        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);

        function unlock() { lockscreen.classList.add('unlocked'); }
        
        function goHome() { 
            document.querySelectorAll('.app-window').forEach(w => w.classList.remove('open'));
        }
        
        function openApp(id) { 
            document.getElementById(id).classList.add('open');
        }

        function togglePower() {
            const device = document.getElementById('device');
            if (isPowerOn) {
                device.style.opacity = "0";
                isPowerOn = false;
            } else {
                device.style.opacity = "1";
                lockscreen.classList.remove('unlocked');
                goHome();
                isPowerOn = true;
            }
        }

        function updateTime() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = time;
            document.getElementById('lock-clock').innerText = time;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
