<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomOS 1.0 Beta</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            background: url('https://images.unsplash.com/photo-1477346611705-65d1883cee1e?auto=format&fit=crop&q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .phone-container {
            width: 320px; height: 650px;
            background: #000;
            border: 14px solid #000000;
            border-radius: 55px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        .power-btn {
            width: 4px; height: 60px; background: #ff3b30;
            position: absolute; right: -18px; top: 120px;
            border-radius: 0 5px 5px 0; cursor: pointer; z-index: 100;
        }

        .punch-hole {
            width: 18px; height: 18px;
            background: #000000;
            border-radius: 50%; position: absolute; top: 15px;
            left: 50%; transform: translateX(-50%); z-index: 95;
        }

        :root {
            --lock-bg: none;
            --home-bg: none;
        }

        .screen {
            width: 100%; height: 100%;
            background: #000; position: relative;
            border-radius: 41px; overflow: hidden;
        }

        .wallpaper {
            position: absolute; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.8s ease;
            z-index: 1;
            background-color: #1a1a1a;
            pointer-events: none;
        }

        #lock-wp { background-image: var(--lock-bg); }
        #home-wp { background-image: var(--home-bg); }

        .wallpaper.app-active {
            transform: scale(1.15);
            filter: blur(15px) brightness(0.7);
        }

        #power-overlay {
            position: absolute; width: 100%; height: 100%;
            background: black; z-index: 90; pointer-events: none;
            transition: opacity 0.6s ease-in-out; opacity: 1;
        }

        .view {
            display: none; width: 100%; height: 100%;
            position: absolute; flex-direction: column;
            color: white; border-radius: 41px; z-index: 10;
        }

        #homescreen {
            padding-top: 60px;
            transform: scale(1.3); opacity: 0;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease;
            align-content: flex-start;
        }
        #homescreen.unlocked { transform: scale(1); opacity: 1; }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .app-icon-container {
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
        }

        .app-icon {
            width: 55px; height: 55px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
        }

        .app-label {
            font-size: 11px; text-align: center; margin-top: 5px; color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        /* Settings App Styles */
        #settings-app {
            display: flex; background: rgba(0,0,0,0.7); z-index: 40;
            backdrop-filter: blur(25px); overflow: hidden;
            transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease;
            transform: scale(0); opacity: 0; pointer-events: none;
            transform-origin: 40px 100px;
        }
        #settings-app.open { transform: scale(1); opacity: 1; pointer-events: auto; }
        .settings-content-wrapper { display: flex; width: 400%; height: 100%; transition: transform 0.5s ease; }
        .settings-page { width: 25%; height: 100%; display: flex; flex-direction: column; }
        .settings-header { padding: 50px 20px 20px; font-size: 24px; font-weight: bold; }
        .settings-item { padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; cursor: pointer; }

        /* Camera App Styles */
        #camera-app {
            display: flex; background: #000; z-index: 50; overflow: hidden;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s ease;
            transform: scale(0); opacity: 0; pointer-events: none;
            transform-origin: 120px 100px;
        }
        #camera-app.open { transform: scale(1); opacity: 1; pointer-events: auto; }
        #camera-feed {
            width: 100%; height: 100%; object-fit: cover;
            transform: scaleX(1); 
        }
        .camera-ui {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 60;
        }
        .shutter-btn {
            width: 65px; height: 65px; background: white; border-radius: 50%;
            border: 4px solid #333; outline: 2px solid white; cursor: pointer;
            transition: transform 0.1s;
        }
        .shutter-btn:active { transform: scale(0.9); }

        .flip-btn {
            position: absolute; right: 30px; background: rgba(0,0,0,0.5);
            width: 40px; height: 40px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 20px; cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .cam-error {
            position: absolute; top: 50%; width: 100%; text-align: center;
            color: white; padding: 20px; box-sizing: border-box; display: none;
        }

        #toast {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.9); color: black; padding: 8px 16px;
            border-radius: 20px; font-size: 12px; opacity: 0; transition: opacity 0.3s; z-index: 110;
        }

        #home-bar {
            width: 110px; height: 4px; background: rgba(255, 255, 255, 0.5);
            border-radius: 10px; position: absolute; bottom: 10px;
            left: 50%; transform: translateX(-50%); z-index: 100;
            cursor: pointer; opacity: 0; transition: opacity 0.4s;
        }

        #time { font-size: 3.8rem; font-weight: 200; text-shadow: 0 2px 15px rgba(0,0,0,0.4); margin-top: 80px; text-align: center;}
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="power-btn" onclick="togglePower()"></div>
        <div class="punch-hole"></div>
        <div id="home-bar" onclick="handleHomeBar()"></div>
        <div id="toast">developer options activated</div>

        <div class="screen">
            <div id="lock-wp" class="wallpaper"></div>
            <div id="home-wp" class="wallpaper" style="display:none"></div>
            <div id="power-overlay"></div>

            <div id="lockscreen" class="view">
                <p id="time">00:00</p>
            </div>

            <div id="homescreen" class="view">
                <div class="app-grid">
                    <div class="app-icon-container" onclick="openSettings()">
                        <div class="app-icon">⚙️</div>
                        <p class="app-label">Settings</p>
                    </div>

                    <div class="app-icon-container" onclick="openCamera()">
                        <div class="app-icon" style="background: rgba(200, 200, 200, 0.3);">📷</div>
                        <p class="app-label">Camera</p>
                    </div>
                </div>
            </div>

            <div id="settings-app" class="view">
                <div class="settings-content-wrapper" id="settings-nav">
                    <div class="settings-page">
                        <div class="settings-header">Settings</div>
                        <div class="settings-item" onclick="goToPage(1)">About Phone <span>></span></div>
                        <div class="settings-item" onclick="goToPage(2)">Customization <span>></span></div>
                        <div class="settings-item" id="dev-opt-item" style="display:none" onclick="goToPage(3)">Developer Options <span>></span></div>
                    </div>
                    <div class="settings-page">
                        <div class="settings-header"><span onclick="goToPage(0)" style="color:#007aff; cursor:pointer">❮ Back</span></div>
                        <p id="os-text" onclick="handleDevClick()" style="text-align:center; font-size: 22px; margin-top: 20px; font-weight: 700; cursor: pointer;">RandomOS 1.0</p>
                        <div class="settings-item"><span style="color:#888">Phone Name</span><span>rPhone 1 Pro</span></div>
                    </div>
                    <div class="settings-page">
                        <div class="settings-header"><span onclick="goToPage(0)" style="color:#007aff; cursor:pointer">❮ Back</span></div>
                        <div style="padding: 20px;">
                            <button onclick="document.getElementById('wp-input').click()" style="width:100%; padding: 15px; border-radius: 12px; border:none; background:rgba(255,255,255,0.1); color:white; cursor:pointer;">Select Wallpaper</button>
                            <input type="file" id="wp-input" hidden accept="image/*" onchange="handleFile(this)">
                        </div>
                    </div>
                    <div class="settings-page">
                        <div class="settings-header"><span onclick="goToPage(0)" style="color:#007aff; cursor:pointer">❮ Back</span></div>
                        <div style="flex:1; display:flex; justify-content:center; align-items:center;">
                            <h1 style="font-size: 40px; color: #444;">none</h1>
                        </div>
                    </div>
                </div>
            </div>

            <div id="camera-app" class="view">
                <video id="camera-feed" autoplay playsinline></video>
                <canvas id="camera-canvas" style="display:none;"></canvas>
                <div id="cam-error" class="cam-error">Camera access denied or not found.</div>
                
                <div class="camera-ui">
                    <div class="shutter-btn" onclick="takePhoto()"></div>
                    <div class="flip-btn" onclick="flipCamera()">🔄</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let isPowerOn = false, isUnlocked = false, clickCount = 0, devActive = false;
        const lockWP = document.getElementById('lock-wp'), homeWP = document.getElementById('home-wp');

        let currentStream = null;
        let facingMode = "environment"; 

        // --- SOUND EFFECTS CONFIG ---
        const powerSound = new Audio('https://www.fesliyanstudios.com/play-mp3/6030'); // Mechanical Click
        const shutterSound = new Audio('https://www.fesliyanstudios.com/play-mp3/589'); // Camera Shutter
        const unlockSound = new Audio('https://www.fesliyanstudios.com/play-mp3/343'); // Soft Chime

        function togglePower() {
            powerSound.currentTime = 0; // Reset sound to start
            powerSound.play(); // Play click sound
            
            isPowerOn = !isPowerOn;
            document.getElementById('power-overlay').style.opacity = isPowerOn ? '0' : '1';
            document.getElementById('home-bar').style.opacity = isPowerOn ? '1' : '0';
            if (isPowerOn) {
                document.getElementById('lockscreen').style.display = 'flex';
                if (!isUnlocked) {
                    lockWP.style.display = 'block';
                    homeWP.style.display = 'none';
                } else {
                    lockWP.style.display = 'none';
                    homeWP.style.display = 'block';
                }
                updateClock();
            } else {
                setTimeout(() => {
                    document.getElementById('lockscreen').style.display = 'none';
                    document.getElementById('homescreen').style.display = 'none';
                    document.getElementById('homescreen').classList.remove('unlocked');
                    document.getElementById('settings-app').classList.remove('open');
                    document.getElementById('camera-app').classList.remove('open');
                    stopCamera(); 
                    lockWP.classList.remove('app-active');
                    homeWP.classList.remove('app-active');
                    isUnlocked = false;
                    goToPage(0);
                }, 600);
            }
        }

        function handleHomeBar() {
            const settings = document.getElementById('settings-app');
            const camera = document.getElementById('camera-app');

            if (settings.classList.contains('open')) {
                settings.classList.remove('open');
                lockWP.classList.remove('app-active');
                homeWP.classList.remove('app-active');
            } else if (camera.classList.contains('open')) {
                camera.classList.remove('open');
                stopCamera(); 
                lockWP.classList.remove('app-active');
                homeWP.classList.remove('app-active');
            } else if (isPowerOn && !isUnlocked) {
                // Play Unlock Sound
                unlockSound.currentTime = 0;
                unlockSound.play();
                
                isUnlocked = true;
                document.getElementById('lockscreen').style.display = 'none';
                document.getElementById('homescreen').style.display = 'flex';
                lockWP.style.display = 'none';
                homeWP.style.display = 'block';
                requestAnimationFrame(() => document.getElementById('homescreen').classList.add('unlocked'));
            }
        }

        function openSettings() { 
            document.getElementById('settings-app').classList.add('open');
            lockWP.classList.add('app-active');
            homeWP.classList.add('app-active');
        }

        function openCamera() {
            document.getElementById('camera-app').classList.add('open');
            lockWP.classList.add('app-active');
            homeWP.classList.add('app-active');
            startCamera();
        }

        async function startCamera() {
            if (currentStream) stopCamera(); 
            const videoElement = document.getElementById('camera-feed');
            const errorText = document.getElementById('cam-error');
            errorText.style.display = 'none';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: facingMode }
                });
                
                currentStream = stream;
                videoElement.srcObject = stream;

                if (facingMode === "user") {
                    videoElement.style.transform = "scaleX(-1)";
                } else {
                    videoElement.style.transform = "scaleX(1)";
                }

            } catch (err) {
                console.error("Camera error:", err);
                errorText.style.display = 'block';
            }
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        }

        function flipCamera() {
            facingMode = (facingMode === "user") ? "environment" : "user";
            startCamera();
        }

        function takePhoto() {
            // Play Shutter Sound
            shutterSound.currentTime = 0;
            shutterSound.play();

            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('camera-canvas');
            const context = canvas.getContext('2d');

            const app = document.getElementById('camera-app');
            app.style.opacity = '0.5';
            setTimeout(() => { app.style.opacity = '1'; }, 100);

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            if (facingMode === "user") {
                context.translate(canvas.width, 0);
                context.scale(-1, 1);
            }

            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            try {
                const imageData = canvas.toDataURL("image/png");
                const downloadLink = document.createElement('a');
                downloadLink.href = imageData;
                downloadLink.download = `RandomOS_Photo_${Date.now()}.png`;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            } catch (e) {
                console.error("Save failed", e);
            }
        }

        function goToPage(num) { document.getElementById('settings-nav').style.transform = `translateX(-${num * 25}%)`; }

        function handleFile(input) {
            if (input.files && input.files[0]) {
                const imageUrl = URL.createObjectURL(input.files[0]);
                document.documentElement.style.setProperty('--lock-bg', `url("${imageUrl}")`);
                document.documentElement.style.setProperty('--home-bg', `url("${imageUrl}")`);
                input.value = ""; 
            }
        }

        function handleDevClick() {
            if (devActive) return;
            clickCount++;
            if (clickCount === 6) {
                devActive = true;
                document.getElementById('dev-opt-item').style.display = 'flex';
                const toast = document.getElementById('toast');
                toast.textContent = "developer options activated";
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 2000);
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
