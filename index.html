<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyperOS Pro - Fluid Spam Fix</title>
    <style>
        :root {
            --phone-width: 350px; 
            --phone-height: 700px;
            --icon-radius: 14px;
            --fluid-bezier: cubic-bezier(0.25, 1, 0.3, 1);
            --hyper-bezier: cubic-bezier(0.34, 1.56, 0.64, 1);
            --anim-speed: 0.85s; 
            --glass: rgba(255, 255, 255, 0.15);
            --inner-radius: 34px;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
            background: #d1d1d1; display: flex;
            justify-content: center; align-items: center;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        #phone-wrapper {
            width: var(--phone-width);
            height: var(--phone-height);
            position: relative;
            background-image: url('https://static.thenounproject.com/png/4064637-200.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center; align-items: center;
            perspective: 1000px;
        }

        .power-btn {
            position: absolute; right: 10px; top: 160px;
            width: 4px; height: 55px; background: #222;
            border-radius: 0 4px 4px 0; cursor: pointer; z-index: 3000;
        }

        #phone-container {
            width: 87.5%; 
            height: 93.8%;
            background: #000;
            border-radius: var(--inner-radius);
            position: relative;
            overflow: hidden;
            touch-action: none;
            isolation: isolate;
            border: 8px solid #000;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .bezel-fix {
            position: absolute;
            top: -8px; left: -8px; right: -8px; bottom: -8px;
            border-radius: var(--inner-radius);
            pointer-events: none;
            z-index: 2500;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
        }

        #display-content { width: 100%; height: 100%; transition: opacity 0.4s ease; border-radius: calc(var(--inner-radius) - 8px); overflow: hidden; }
        .screen-off { opacity: 0; pointer-events: none; }

        .punch-hole {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 14px; height: 14px; background: #000; border-radius: 50%; z-index: 100;
        }

        .status-bar {
            position: absolute; top: 12px; width: 100%;
            padding: 0 20px; display: flex; justify-content: space-between;
            color: white; font-size: 10px; font-weight: 500; z-index: 90; box-sizing: border-box;
        }

        .wallpaper-container {
            position: absolute; width: 100%; height: 100%;
            background: #000; overflow: hidden;
        }
        
        #homescreen-wall {
            width: 100%; height: 100%;
            background-image: url('https://r.testifier.nl/Acbs8526SDKI/resizing_type:fill/width:1000/plain/https://s3-newsifier.ams3.digitaloceanspaces.com/gizchina.com/images/2025-08/classic05-68b169bfda720.png@webp');
            background-size: cover; background-position: center;
            transition: transform var(--anim-speed) var(--fluid-bezier), filter var(--anim-speed) var(--fluid-bezier);
        }

        .app-open-active #homescreen-wall {
            transform: scale(1.18);
            filter: blur(20px) brightness(0.7);
        }
        
        .app-open-active .app-grid, 
        .app-open-active .dock,
        .app-open-active .app-icon {
            filter: blur(12px) !important;
            opacity: 0.4;
            transition: filter 0.4s ease, opacity 0.4s ease;
        }

        .layer {
            position: absolute; width: 100%; height: 100%;
            transition: transform var(--anim-speed) var(--fluid-bezier), opacity 0.5s ease;
        }

        #lockscreen {
            background-image: url('https://r.testifier.nl/Acbs8526SDKI/resizing_type:fill/width:1000/plain/https://s3-newsifier.ams3.digitaloceanspaces.com/gizchina.com/images/2025-08/classic05-68b169bfda720.png@webp');
            background-size: cover; background-position: center;
            z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
        }

        .lock-clock { font-size: 3.5rem; font-weight: 200; margin: 0; letter-spacing: -1px; }
        .lock-date { font-size: 0.9rem; font-weight: 400; opacity: 0.8; margin-top: -5px; }

        .unlocked-anim { transform: translateY(-100%) !important; opacity: 0 !important; pointer-events: none; }

        #homescreen { z-index: 40; padding: 50px 20px; box-sizing: border-box; }
        
        .app-grid > div, .dock {
            transform: translateY(100px) scale(0.6) rotateX(-30deg);
            opacity: 0;
            transition: transform 0.8s var(--hyper-bezier), opacity 0.6s ease, filter 0.4s ease;
        }

        .unlocked-ready .app-grid > div, 
        .unlocked-ready .dock {
            transform: translateY(0) scale(1) rotateX(0deg);
            opacity: 1;
        }

        .app-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; 
            transition: filter 0.4s ease, opacity 0.4s ease;
        }

        .dock {
            position: absolute; bottom: 15px; left: 10px; right: 10px;
            height: 65px; background: rgba(255,255,255,0.12);
            backdrop-filter: blur(25px); border-radius: 24px;
            display: flex; justify-content: space-evenly; align-items: center;
            transition: transform 0.8s var(--hyper-bezier), opacity 0.6s ease, filter 0.4s ease;
        }

        .app-icon {
            width: 52px; height: 52px; background: var(--glass);
            border-radius: var(--icon-radius);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.2s, filter 0.4s ease;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; box-sizing: border-box;
        }

        .app-icon.msg-special { background: #fff; }
        .app-icon.msg-special img { width: 55%; height: 55%; }
        .app-icon img { width: 100%; height: 100%; object-fit: contain; }
        .app-icon:active { transform: scale(0.85); }

        #app-window {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 60; transform: scale(0); opacity: 0;
            border-radius: var(--inner-radius);
            pointer-events: none; 
            background: #fff;
            overflow: hidden;
        }

        .settings-container { 
            width: 100%; height: 100%; position: absolute; inset: 0; 
            opacity: 0; pointer-events: none;
        }
        .settings-container.active { 
            opacity: 1; pointer-events: auto; 
        }

        .settings-view { 
            position: absolute; inset: 0; padding: 60px 20px; 
            transition: opacity 0.4s ease, transform 0.4s ease;
            background: #fff;
        }
        .fade-out { opacity: 0; pointer-events: none; transform: scale(0.95); }
        .fade-in { opacity: 1; pointer-events: auto; transform: scale(1); }
        .settings-item {
            padding: 15px; background: #f5f5f5; border-radius: 12px;
            margin-bottom: 10px; cursor: pointer; font-weight: 500;
            display: flex; justify-content: space-between; color: #000;
        }
        .back-btn { position: absolute; top: 40px; left: 15px; font-size: 18px; cursor: pointer; color: #007aff; z-index: 100; }
        .spec-line { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; color: #000;}
        .spec-label { font-size: 12px; color: #888; }
        .spec-value { font-size: 14px; font-weight: 600; }

        .nav-handle-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 40px;
            z-index: 5000; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 8px;
            pointer-events: auto !important; 
        }
        .nav-bar { width: 90px; height: 4px; background: rgba(255,255,255,0.5); border-radius: 10px; }
        .dark-bar { background: rgba(0,0,0,0.25); }
    </style>
</head>
<body>

    <div id="phone-wrapper">
        <div class="power-btn" id="pwr-btn"></div>
        <div id="phone-container">
            <div class="bezel-fix"></div>
            
            <div id="display-content">
                <div class="punch-hole"></div>
                <div class="status-bar"><span></span><span>📶 🔋</span></div>
                
                <div id="lockscreen" class="layer">
                    <h1 class="lock-clock" id="clock">09:41</h1>
                    <span class="lock-date" id="date">Monday, April 20</span>
                </div>

                <div id="homescreen" class="layer">
                    <div class="wallpaper-container" style="position: absolute; top:0; left:0; z-index:-1;">
                        <div id="homescreen-wall"></div>
                    </div>

                    <div class="app-grid">
                        <div style="display:flex; flex-direction:column; align-items:center;">
                            <div class="app-icon" data-name="Settings"><img src="https://hyperosupdates.com/wp-content/themes/miuidownload/icons/com.android.settings.webp"></div>
                        </div>
                        <div style="display:flex; flex-direction:column; align-items:center;">
                            <div class="app-icon" data-name="Gallery"><img src="https://hyperosupdates.com/wp-content/themes/miuidownload/icons/com.miui.gallery.webp"></div>
                        </div>
                    </div>

                    <div class="dock">
                        <div class="app-icon" data-name="Phone"><img src="https://play-lh.googleusercontent.com/bk3e0glVbvRC4Z0uEZ5Oso5wjS89r1P_X5e-k3N_UBkTPXZLhGv50rRy7LAuDzzC9w=w240-h480-rw"></div>
                        <div class="app-icon msg-special" data-name="Messages"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Google_Messages_icon_%282022%29.svg/250px-Google_Messages_icon_%282022%29.svg.png"></div>
                        <div class="app-icon" data-name="Browser"><img src="https://downloadr2.apkmirror.com/wp-content/uploads/2020/07/79/5f06abb0c532a.png"></div>
                        <div class="app-icon" data-name="Camera"><img src="https://hyperosupdates.com/wp-content/themes/miuidownload/icons/com.android.camera.webp"></div>
                    </div>
                </div>

                <div id="app-window">
                    <div id="settings-ui" class="settings-container">
                        <div id="main-settings" class="settings-view fade-in">
                            <h2 style="margin-top:0; color: #000;">Settings</h2>
                            <div class="settings-item" id="about-phone-trigger">
                                <span>About Phone</span>
                                <span>></span>
                            </div>
                        </div>
                        <div id="about-phone-page" class="settings-view fade-out">
                            <div class="back-btn" id="back-to-settings">← Settings</div>
                            <div style="text-align:center; margin-bottom:20px; margin-top:40px;">
                                <img src="https://xiaomiplanet.sk/wp-content/uploads/2025/05/HyperOS-3.jpg" style="width:180px; border-radius:12px;">
                            </div>
                            <div class="spec-line"><span class="spec-label">Phone Name</span><span class="spec-value">Xiaomi 14</span></div>
                            <div class="spec-line"><span class="spec-label">Software Version</span><span class="spec-value">3.0.0.14</span></div>
                            <div class="spec-line"><span class="spec-label">Android Version</span><span class="spec-value">16</span></div>
                        </div>
                    </div>
                    <div id="gallery-ui" class="settings-container" style="background:#fff; display:flex; align-items:center; justify-content:center;">
                        <h2 style="color:#888;">No Photos</h2>
                    </div>
                </div>

                <div class="nav-handle-container" id="nav-trigger">
                    <div class="nav-bar" id="visual-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('clock').innerText = `${hours}:${minutes}`;
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', options);
        }
        setInterval(updateTime, 1000);
        updateTime();

        const lockscreen = document.getElementById('lockscreen');
        const homescreen = document.getElementById('homescreen');
        const appWindow = document.getElementById('app-window');
        const visualBar = document.getElementById('visual-bar');
        const trigger = document.getElementById('nav-trigger');
        const pwrBtn = document.getElementById('pwr-btn');
        const phone = document.getElementById('phone-container');
        const display = document.getElementById('display-content');
        const settingsUI = document.getElementById('settings-ui');
        const galleryUI = document.getElementById('gallery-ui');

        let isPowerOn = true;
        let startY = 0;
        let isDragging = false;
        let activeAnim = null;

        document.getElementById('about-phone-trigger').addEventListener('click', () => {
            document.getElementById('main-settings').classList.replace('fade-in', 'fade-out');
            document.getElementById('about-phone-page').classList.replace('fade-out', 'fade-in');
        });

        document.getElementById('back-to-settings').addEventListener('click', () => {
            document.getElementById('about-phone-page').classList.replace('fade-in', 'fade-out');
            document.getElementById('main-settings').classList.replace('fade-out', 'fade-in');
        });

        document.querySelectorAll('.app-icon').forEach(icon => {
            icon.addEventListener('pointerdown', (e) => {
                if (!isPowerOn || !lockscreen.classList.contains('unlocked-anim')) return;
                
                const appName = icon.getAttribute('data-name');
                
                // KILL current animation if user spams
                if (activeAnim) activeAnim.cancel();

                // Toggle content
                [settingsUI, galleryUI].forEach(ui => ui.classList.remove('active'));
                if (appName === "Settings") settingsUI.classList.add('active');
                if (appName === "Gallery") galleryUI.classList.add('active');

                const rect = icon.getBoundingClientRect();
                const phoneRect = phone.getBoundingClientRect();
                const x = ((rect.left + rect.width/2) - phoneRect.left) / phoneRect.width * 100;
                const y = ((rect.top + rect.height/2) - phoneRect.top) / phoneRect.height * 100;
                
                appWindow.style.transformOrigin = `${x}% ${y}%`;
                appWindow.style.pointerEvents = 'auto';
                phone.classList.add('app-open-active');
                visualBar.classList.add('dark-bar');

                activeAnim = appWindow.animate([
                    { transform: 'scale(0)', opacity: 0, borderRadius: '34px' },
                    { transform: 'scale(1)', opacity: 1, borderRadius: '26px' }
                ], {
                    duration: 500,
                    easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
                    fill: 'forwards'
                });
            });
        });

        trigger.addEventListener('pointerdown', (e) => { 
            if (isPowerOn) { isDragging = true; startY = e.clientY; } 
        });

        window.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            if (startY - e.clientY > 30) { 
                if (!lockscreen.classList.contains('unlocked-anim')) {
                    lockscreen.classList.add('unlocked-anim');
                    homescreen.classList.add('unlocked-ready');
                    visualBar.classList.add('dark-bar');
                } else {
                    if (activeAnim) activeAnim.cancel();
                    phone.classList.remove('app-open-active');
                    
                    activeAnim = appWindow.animate([
                        { transform: 'scale(1)', opacity: 1, borderRadius: '26px' },
                        { transform: 'scale(0)', opacity: 0, borderRadius: '34px' }
                    ], {
                        duration: 400,
                        easing: 'cubic-bezier(0.25, 1, 0.3, 1)',
                        fill: 'forwards'
                    });

                    activeAnim.onfinish = () => {
                        appWindow.style.pointerEvents = 'none';
                        document.getElementById('about-phone-page').classList.replace('fade-in', 'fade-out');
                        document.getElementById('main-settings').classList.replace('fade-out', 'fade-in');
                    };
                }
            }
            isDragging = false;
        });

        pwrBtn.addEventListener('click', () => {
            if (isPowerOn) {
                if (activeAnim) activeAnim.cancel();
                phone.classList.remove('app-open-active');
                lockscreen.classList.remove('unlocked-anim');
                homescreen.classList.remove('unlocked-ready');
                display.classList.add('screen-off');
                visualBar.classList.remove('dark-bar');
                appWindow.style.opacity = "0";
                appWindow.style.transform = "scale(0)";
                isPowerOn = false;
            } else {
                display.classList.remove('screen-off');
                isPowerOn = true;
            }
        });
    </script>
</body>
</html>
