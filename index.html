<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RandomOS 1.0 Beta</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: filter 0.5s ease;
            touch-action: none; /* Prevents web scrolling */
        }

        /* Ambient Background Glow */
        body::before {
            content: "";
            position: absolute;
            width: 150%; height: 150%;
            background: radial-gradient(circle, rgba(255,59,48,0.1) 0%, transparent 70%);
            z-index: -1;
            animation: pulseGlow 10s infinite alternate;
        }

        @keyframes pulseGlow {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        .phone-container {
            width: 330px; height: 680px;
            background: #080808;
            border: 12px solid #1a1a1a;
            border-radius: 60px;
            position: relative;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255,255,255,0.05);
            transition: transform 0.3s ease;
        }

        .power-btn {
            width: 5px; height: 50px; 
            background: linear-gradient(to bottom, #ff3b30, #ff7b30);
            position: absolute; right: -17px; top: 140px;
            border-radius: 0 5px 5px 0; cursor: pointer; z-index: 100;
            box-shadow: 2px 0 10px rgba(255, 59, 48, 0.5);
        }

        .punch-hole {
            width: 16px; height: 16px;
            background: #000;
            border: 2px solid #111;
            border-radius: 50%; position: absolute; top: 20px;
            right: 40px; z-index: 95;
            box-shadow: inset 0 0 5px rgba(255,255,255,0.2);
        }

        :root {
            --lock-bg: url('https://images.unsplash.com/photo-1477346611705-65d1883cee1e?auto=format&fit=crop&q=80&w=2070');
            --home-bg: url('https://images.unsplash.com/photo-1477346611705-65d1883cee1e?auto=format&fit=crop&q=80&w=2070');
        }

        .screen {
            width: 100%; height: 100%;
            background: #000; position: relative;
            border-radius: 48px; overflow: hidden;
        }

        #live-wp-video {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            display: none;
        }

        .wallpaper {
            position: absolute; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1), filter 0.8s ease, opacity 0.5s ease;
            z-index: 1;
            background-color: #1a1a1a;
            pointer-events: none;
        }

        #lock-wp { background-image: var(--lock-bg); }
        #home-wp { background-image: var(--home-bg); display: none; }

        .wallpaper.app-active {
            transform: scale(1.1);
            filter: blur(20px) brightness(0.6);
        }

        #power-overlay {
            position: absolute; width: 100%; height: 100%;
            background: black; z-index: 90; pointer-events: none;
            transition: opacity 0.4s ease-in-out; opacity: 1;
        }

        .view {
            display: none; width: 100%; height: 100%;
            position: absolute; flex-direction: column;
            color: white; border-radius: 48px; z-index: 10;
        }

        #homescreen {
            padding-top: 60px;
            transform: translateY(20px) scale(0.9); opacity: 0;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease;
        }
        #homescreen.unlocked { transform: translateY(0) scale(1); opacity: 1; }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 25px;
        }

        .app-icon-container {
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .app-icon-container:active { transform: scale(0.85); }

        .app-icon {
            width: 58px; height: 58px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; 
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .app-label {
            font-size: 11px; text-align: center; margin-top: 7px; color: rgba(255,255,255,0.9);
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Settings Design Update */
        #settings-app {
            display: flex; background: rgba(15, 15, 15, 0.85); z-index: 40;
            backdrop-filter: blur(30px); overflow: hidden;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            transform: scale(0); opacity: 0; pointer-events: none;
            border-radius: 48px;
        }
        #settings-app.open { transform: scale(1); opacity: 1; pointer-events: auto; }
        
        .settings-header { 
            padding: 60px 25px 20px; 
            font-size: 28px; 
            font-weight: 700; 
            letter-spacing: -0.5px;
        }
        
        .settings-item { 
            padding: 20px 25px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; justify-content: space-between; 
            cursor: pointer; align-items: center;
            transition: background 0.2s;
        }
        .settings-item:active { background: rgba(255,255,255,0.05); }

        #toast {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(40,40,40,0.95); color: white; padding: 10px 20px;
            border-radius: 30px; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 110;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        #home-bar {
            width: 120px; height: 5px; background: rgba(255, 255, 255, 0.4);
            border-radius: 10px; position: absolute; bottom: 12px;
            left: 50%; transform: translateX(-50%); z-index: 100;
            cursor: pointer; transition: background 0.3s;
        }
        #home-bar:hover { background: rgba(255, 255, 255, 0.7); }

        #time { font-size: 4.2rem; font-weight: 200; letter-spacing: -2px; margin-top: 100px; text-align: center; }
    
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background: linear-gradient(to right, #ff3b30, #ff7b30); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-custom { 
            width:100%; padding: 16px; border-radius: 18px; border:none; 
            background: rgba(255,255,255,0.08); color:white; font-weight: 600;
            cursor:pointer; margin-bottom: 12px; transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .btn-custom:hover { background: rgba(255,255,255,0.12); }

        /* Camera App Window Styles */
        #camera-app {
            display: flex; background: #000; z-index: 40;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            transform: scale(0); opacity: 0; pointer-events: none;
            border-radius: 48px;
        }
        #camera-app.open { transform: scale(1); opacity: 1; pointer-events: auto; }

        /* NEW: Bootloader & Custom OS Styles */
        #boot-animation {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #000; z-index: 200; display: none;
            justify-content: center; align-items: center; color: white;
            flex-direction: column;
        }
        .boot-text { font-size: 24px; font-weight: bold; letter-spacing: 2px; animate: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        #modal-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); z-index: 150; display: none;
            justify-content: center; align-items: center;
        }
        .modal-box {
            background: #1c1c1e; width: 80%; padding: 20px; border-radius: 20px;
            text-align: center; color: white; border: 1px solid #333;
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }

    </style>
</head>
<body>

    <div class="phone-container">
        <div class="power-btn" onclick="togglePower()"></div>
        <div class="punch-hole"></div>
        <div id="home-bar" onclick="handleHomeBar()"></div>
        <div id="toast">Developer options activated</div>

        <div id="boot-animation">
            <div class="boot-text" id="boot-label">RandomOS</div>
            <div id="boot-subtext" style="font-size: 10px; margin-top: 10px; opacity: 0.6;"></div>
        </div>

        <div id="modal-overlay">
            <div class="modal-box" id="modal-content">
                </div>
        </div>

        <div class="screen">
            <video id="live-wp-video" autoplay loop muted playsinline></video>
            
            <div id="lock-wp" class="wallpaper"></div>
            <div id="home-wp" class="wallpaper"></div>
            <div id="power-overlay"></div>

            <div id="lockscreen" class="view">
                <p id="time">00:00</p>
                <p style="text-align:center; font-size: 14px; opacity: 0.7; margin-top: -20px;">Swipe up to unlock</p>
            </div>

            <div id="homescreen" class="view">
                <div class="app-grid" id="main-grid">
                    <div class="app-icon-container" onclick="openApp('settings-app', this)">
                        <div class="app-icon" style="background: linear-gradient(135deg, #8e8e93, #48484a);">⚙️</div>
                        <p class="app-label">Settings</p>
                    </div>

                    <div class="app-icon-container" onclick="openApp('camera-app', this)">
                        <div class="app-icon" style="background: linear-gradient(135deg, #5e5e5e, #1c1c1c);">📷</div>
                        <p class="app-label">Camera</p>
                    </div>
                </div>
            </div>

            <div id="settings-app" class="view">
                <div class="settings-content-wrapper" id="settings-nav" style="display: flex; width: 400%; height: 100%; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);">
                    <div style="width: 25%;">
                        <div class="settings-header">Settings</div>
                        <div class="settings-item" onclick="goToPage(1)">About Phone <span style="opacity:0.3">></span></div>
                        <div class="settings-item" onclick="goToPage(2)">Customization <span style="opacity:0.3">></span></div>
                        <div class="settings-item" id="dev-opt-item" style="display:none" onclick="goToPage(3)">Developer Options <span style="color:#ff3b30">></span></div>
                    </div>
                    <div style="width: 25%;">
                        <div class="settings-header"><span onclick="goToPage(0)" style="color:#ff3b30; cursor:pointer; font-size: 18px;">❮ Back</span></div>
                        <p id="os-text" onclick="handleDevClick()" style="text-align:center; font-size: 22px; margin-top: 20px; font-weight: 700; cursor: pointer;">RandomOS 1.1</p>
                        <div class="settings-item"><span style="color:#888">Device</span><span>Samsung S10</span></div>
                    </div>
                    <div style="width: 25%;">
                        <div class="settings-header"><span onclick="goToPage(0)" style="color:#ff3b30; cursor:pointer; font-size: 18px;">❮ Back</span></div>
                        <div style="padding: 25px;">
                            <button class="btn-custom" onclick="document.getElementById('wp-input').click()">Static Wallpaper</button>
                            <input type="file" id="wp-input" hidden accept="image/*" onchange="handleFile(this, 'static')">

                            <button class="btn-custom" style="border: 1px solid rgba(255,59,48,0.5);" onclick="document.getElementById('live-wp-input').click()">Live Wallpaper</button>
                            <input type="file" id="live-wp-input" hidden accept="video/mp4, image/gif" onchange="handleFile(this, 'live')">
                        </div>
                    </div>
                    <div style="width: 25%;">
                        <div class="settings-header"><span onclick="goToPage(0)" style="color:#ff3b30; cursor:pointer; font-size: 18px;">❮ Back</span></div>
                        <div class="settings-item" onclick="startUnlockSequence()">
                            <span>Unlock Bootloader</span>
                            <span style="color:#ff3b30; font-size: 12px;">UNSAFE</span>
                        </div>
                        <div class="settings-item">
                            <span>Chaos Mode</span>
                            <label class="switch">
                                <input type="checkbox" id="chaos-toggle" onchange="toggleChaos(this)">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div id="camera-app" class="view">
                <video id="camera-feed" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
                <div style="position: absolute; bottom: 60px; width:100%; display:flex; justify-content:space-around; align-items:center;">
                    <div style="width:40px;"></div>
                    <div style="width:70px; height:70px; background:white; border-radius:50%; border:5px solid rgba(255,255,255,0.3); cursor:pointer;" onclick="takePhoto()"></div>
                    <div style="font-size:24px; cursor:pointer;" onclick="flipCamera()">🔄</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isPowerOn = false, isUnlocked = false, clickCount = 0, devActive = false, chaosInterval;
        let audioPrimed = false, usingLiveWP = false;
        let isCustomOS = false;

        const lockWP = document.getElementById('lock-wp'), homeWP = document.getElementById('home-wp');
        const liveWP = document.getElementById('live-wp-video');
        const mainGrid = document.getElementById('main-grid');

        let currentStream = null, facingMode = "environment"; 

        // Sounds
        const powerSound = new Audio('mixkit-mouse-click-close-1113.wav');
        const shutterSound = new Audio('mixkit-camera-lens-shutter-1433.wav');
        const unlockSound = new Audio('windows-8-8-1-startup-sound.mp3');

        function togglePower() {
            if (!audioPrimed) {
                [powerSound, shutterSound, unlockSound].forEach(s => {
                    s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(() => {});
                });
                audioPrimed = true;
            }

            powerSound.currentTime = 0; 
            powerSound.play();
            
            isPowerOn = !isPowerOn;
            document.getElementById('power-overlay').style.opacity = isPowerOn ? '0' : '1';
            
            if (isPowerOn) {
                document.getElementById('lockscreen').style.display = 'flex';
                updateWallpaperVisibility();
                if(usingLiveWP) liveWP.play();
                updateClock();
            } else {
                if(usingLiveWP) liveWP.pause();
                setTimeout(() => {
                    document.getElementById('lockscreen').style.display = 'none';
                    document.getElementById('homescreen').style.display = 'none';
                    document.getElementById('homescreen').classList.remove('unlocked');
                    document.getElementById('settings-app').classList.remove('open');
                    document.getElementById('camera-app').classList.remove('open');
                    stopCamera(); 
                    lockWP.classList.remove('app-active');
                    homeWP.classList.remove('app-active');
                    isUnlocked = false;
                    goToPage(0);
                }, 400);
            }
        }

        // --- NEW BOOTLOADER LOGIC ---
        function startUnlockSequence() {
            const modal = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            modal.style.display = 'flex';
            content.innerHTML = `
                <h3>Are you sure?</h3>
                <p style="font-size: 13px; opacity:0.8;">If you unlock bootloader it will make device not secured and install custom software.</p>
                <div class="modal-btns">
                    <button class="modal-btn" style="background:#333; color:white;" onclick="closeModal()">No</button>
                    <button class="modal-btn" style="background:#ff3b30; color:white;" onclick="confirmUnlock()">Yes</button>
                </div>
            `;
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function confirmUnlock() {
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h3>Success</h3>
                <p style="font-size: 13px; opacity:0.8;">Preparing to custom rom...</p>
                <div class="modal-btns">
                    <button class="modal-btn" style="background:#ff3b30; color:white; flex:1;" onclick="rebootToCustom()">Restart</button>
                </div>
            `;
        }

        function rebootToCustom() {
            closeModal();
            const bootAnim = document.getElementById('boot-animation');
            const bootLabel = document.getElementById('boot-label');
            
            // Turn off screen first
            document.getElementById('power-overlay').style.opacity = '1';
            
            setTimeout(() => {
                bootAnim.style.display = 'flex';
                bootLabel.innerText = "CustomOS";
                document.getElementById('boot-subtext').innerText = "Booting Unlocked Kernel...";
                
                setTimeout(() => {
                    // "Boom" - Custom OS Loaded
                    isCustomOS = true;
                    applyCustomOSTheme();
                    bootAnim.style.display = 'none';
                    togglePower(); // Fake "Auto-on" after reboot
                }, 4000);
            }, 1000);
        }

        function applyCustomOSTheme() {
            document.getElementById('os-text').innerText = "CustomOS v1.0 (Unlocked)";
            // Change colors to indicate Custom OS
            document.documentElement.style.setProperty('--lock-bg', "linear-gradient(45deg, #000, #400)");
            document.body.style.background = "linear-gradient(135deg, #2e1a1a 0%, #3e1616 100%)";
            const toast = document.getElementById('toast');
            toast.innerText = "Welcome to CustomOS";
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);
        }
        // --- END BOOTLOADER LOGIC ---

        function updateWallpaperVisibility() {
            if (usingLiveWP) {
                lockWP.style.display = 'none';
                homeWP.style.display = 'none';
                liveWP.style.display = 'block';
            } else {
                liveWP.style.display = 'none';
                lockWP.style.display = isUnlocked ? 'none' : 'block';
                homeWP.style.display = isUnlocked ? 'block' : 'none';
            }
        }

        function handleHomeBar() {
            const settings = document.getElementById('settings-app');
            const camera = document.getElementById('camera-app');

            if (settings.classList.contains('open') || camera.classList.contains('open')) {
                settings.classList.remove('open');
                camera.classList.remove('open');
                stopCamera(); 
                lockWP.classList.remove('app-active');
                homeWP.classList.remove('app-active');
            } else if (isPowerOn && !isUnlocked) {
                unlockSound.currentTime = 0;
                unlockSound.play();
                isUnlocked = true;
                document.getElementById('lockscreen').style.display = 'none';
                document.getElementById('homescreen').style.display = 'flex';
                updateWallpaperVisibility();
                setTimeout(() => document.getElementById('homescreen').classList.add('unlocked'), 50);
            }
        }

        function toggleChaos(toggle) {
            if (toggle.checked) {
                mainGrid.classList.add('chaos-active');
                chaosInterval = setInterval(() => {
                    document.body.style.filter = Math.random() > 0.8 ? 'invert(1)' : 'invert(0)';
                }, 1000);
            } else {
                mainGrid.classList.remove('chaos-active');
                clearInterval(chaosInterval);
                document.body.style.filter = 'invert(0)';
            }
        }

        function openApp(appId, iconElement) {
            const app = document.getElementById(appId);
            const rect = iconElement.getBoundingClientRect();
            const containerRect = document.querySelector('.screen').getBoundingClientRect();
            const x = (rect.left + rect.width / 2) - containerRect.left;
            const y = (rect.top + rect.height / 2) - containerRect.top;
            app.style.transformOrigin = `${x}px ${y}px`;
            app.style.display = 'flex';
            setTimeout(() => { app.classList.add('open'); }, 10);
            lockWP.classList.add('app-active');
            homeWP.classList.add('app-active');
            if(appId === 'camera-app') startCamera();
        }

        async function startCamera() {
            if (currentStream) stopCamera(); 
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode } });
                currentStream = stream;
                document.getElementById('camera-feed').srcObject = stream;
            } catch (err) { console.log("Cam error"); }
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        }

        function flipCamera() {
            facingMode = (facingMode === "user") ? "environment" : "user";
            startCamera();
        }

        function takePhoto() {
            shutterSound.currentTime = 0; shutterSound.play();
            const app = document.getElementById('camera-app');
            app.style.opacity = '0.4';
            setTimeout(() => app.style.opacity = '1', 100);
        }

        function goToPage(num) { document.getElementById('settings-nav').style.transform = `translateX(-${num * 25}%)`; }

        function handleFile(input, type) {
            if (input.files && input.files[0]) {
                const fileUrl = URL.createObjectURL(input.files[0]);
                if (type === 'static') {
                    usingLiveWP = false;
                    document.documentElement.style.setProperty('--lock-bg', `url("${fileUrl}")`);
                    document.documentElement.style.setProperty('--home-bg', `url("${fileUrl}")`);
                } else {
                    usingLiveWP = true;
                    liveWP.src = fileUrl;
                    liveWP.play();
                }
                updateWallpaperVisibility();
            }
        }

        function handleDevClick() {
            if (devActive) return;
            clickCount++;
            if (clickCount >= 6) {
                devActive = true;
                document.getElementById('dev-opt-item').style.display = 'flex';
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 2000);
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
