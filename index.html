<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomOS 1.0 Beta</title>
    <style>
        body {
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        /* The Phone Frame */
        .phone-container {
            width: 320px;
            height: 650px;
            background: #000000;
            border: 12px solid #1a1a1a;
            border-radius: 55px;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: visible;
        }

        /* Red Power Button */
        .power-btn {
            width: 4px;
            height: 60px;
            background: #ff3b30;
            position: absolute;
            right: -16px;
            top: 120px;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            z-index: 100;
        }

        .punch-hole {
            width: 12px;
            height: 12px;
            background: #1a1a1a;
            border-radius: 50%;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
        }

        /* The Screen */
        .screen {
            flex-grow: 1;
            background: #000000;
            position: relative;
            border-radius: 43px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* UI Views */
        .view {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            flex-direction: column;
            align-items: center;
            color: white;
            animation: fadeIn 0.3s ease;
        }

        /* Lockscreen */
        #lockscreen {
            padding-top: 80px;
        }

        #time { font-size: 3.5rem; font-weight: 200; margin: 0; }
        #date { font-size: 1rem; color: #888; margin-top: -5px; }

        /* Home Screen */
        #homescreen {
            padding-top: 50px;
            background: linear-gradient(180deg, #1a1a2e 0%, #000 100%);
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
            margin-top: 20px;
        }

        .app-icon {
            width: 50px;
            height: 50px;
            background: #333;
            border-radius: 12px;
        }

        /* Home Indicator Bar */
        #home-bar {
            width: 110px;
            height: 4px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
            cursor: pointer;
            display: none; /* Hidden when phone is off */
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="power-btn" onclick="togglePower()"></div>
        <div class="punch-hole"></div>
        <div id="home-bar" onclick="unlockPhone()"></div>

        <div class="screen" id="main-screen">
            <div id="lockscreen" class="view">
                <p id="time">00:00</p>
                <p id="date">Date</p>
                <p style="position:absolute; bottom:50px; font-size: 12px; color: #555;">Tap bar to unlock</p>
            </div>

            <div id="homescreen" class="view">
                <div class="app-grid">
                    <div class="app-icon" style="background: #00ff96;"></div>
                    <div class="app-icon" style="background: #007aff;"></div>
                    <div class="app-icon" style="background: #ff9500;"></div>
                    <div class="app-icon" style="background: #ff2d55;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isPowerOn = false;
        let isUnlocked = false;

        const screen = document.getElementById('main-screen');
        const lockscreen = document.getElementById('lockscreen');
        const homescreen = document.getElementById('homescreen');
        const homeBar = document.getElementById('home-bar');

        function togglePower() {
            if (!isPowerOn) {
                // TURN ON
                isPowerOn = true;
                isUnlocked = false;
                screen.style.background = "#000";
                lockscreen.style.display = "flex";
                homescreen.style.display = "none";
                homeBar.style.display = "block";
                updateClock();
            } else {
                // TURN OFF (And reset state)
                isPowerOn = false;
                isUnlocked = false;
                screen.style.background = "#000";
                lockscreen.style.display = "none";
                homescreen.style.display = "none";
                homeBar.style.display = "none";
            }
        }

        function unlockPhone() {
            if (isPowerOn && !isUnlocked) {
                isUnlocked = true;
                lockscreen.style.display = "none";
                homescreen.style.display = "flex";
            }
        }

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}`;
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString(undefined, options);
        }

        setInterval(updateClock, 1000);
    </script>
</body>
</html>
