<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaOS V10</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body { 
            background: #121212; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        .phone {
            width: 300px;
            height: 620px;
            background: #000;
            border: 10px solid #222;
            border-radius: 45px;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .screen-container {
            width: 100%;
            height: 100%;
            border-radius: 35px;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        .punch-hole {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 18px;
            background: #000;
            border-radius: 50%;
            z-index: 3000;
        }

        .power-btn {
            position: absolute;
            right: -15px;
            top: 120px;
            width: 8px;
            height: 50px;
            background: #ff3b30;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            z-index: 4000;
        }

        #black-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 2500;
            display: none;
        }
        #black-overlay.is-off { display: block; }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('1000005643.jpg');
            background-size: cover;
            background-position: center;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
        }

        .hidden { opacity: 0; pointer-events: none; transform: scale(0.9); }
        .active { opacity: 1; pointer-events: all; transform: scale(1); }

        #lock-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 500;
        }
        .time { font-size: 3.5rem; font-weight: 300; }
        .date { font-size: 1rem; margin-top: -5px; opacity: 0.9; }

        #home-screen { padding: 60px 15px; z-index: 10; }
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }
        .icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            margin-bottom: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .app span { color: white; font-size: 0.65rem; }

        /* SETTINGS & CUSTOMIZATION WINDOWS */
        .app-window {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #f2f2f7;
            z-index: 1000;
            opacity: 0;
            transform: scale(0.1); 
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s;
            padding: 60px 20px;
        }
        .app-window.open { opacity: 1; transform: scale(1); pointer-events: all; }

        .settings-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #000;
            font-weight: 500;
            cursor: pointer;
        }

        .back-btn {
            color: #007aff;
            font-weight: 600;
            margin-bottom: 20px;
            display: inline-block;
            cursor: pointer;
        }

        #home-bar {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 5px;
            background: rgba(255,255,255,0.7);
            border-radius: 10px;
            z-index: 2600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="phone">
        <div class="power-btn" onclick="togglePower()"></div>

        <div class="screen-container">
            <div class="punch-hole"></div>
            <div id="black-overlay"></div>

            <div id="lock-screen" class="screen active">
                <div class="time" id="clock">00:00</div>
                <div class="date">Friday, April 10</div>
            </div>

            <div id="home-screen" class="screen hidden">
                <div class="app-grid">
                    <div class="app" onclick="openApp('settings-main')">
                        <div class="icon" style="background: #ffffff;">⚙️</div>
                        <span>Settings</span>
                    </div>
                </div>
            </div>

            <div id="settings-main" class="app-window">
                <h2 style="margin-bottom: 25px;">Settings</h2>
                <div class="settings-item" onclick="showSubPage('customization-page')">
                    <span>Customization</span>
                    <span>></span>
                </div>
                <div class="settings-item">
                    <span>About Phone</span>
                    <span>></span>
                </div>
            </div>

            <div id="customization-page" class="app-window">
                <div class="back-btn" onclick="showSubPage('settings-main')"> < Back</div>
                <h2 style="margin-bottom: 25px;">Customization</h2>
                <div class="settings-item" onclick="triggerFileSelect()">
                    <span>Choose Wallpaper</span>
                </div>
            </div>

            <div id="home-bar" onclick="handleBarClick()"></div>
        </div>
    </div>

    <input type="file" id="wallpaper-input" hidden accept="image/*">

    <script>
        let isPhoneOff = false;
        const wallpaperInput = document.getElementById('wallpaper-input');

        // Navigation Logic
        function handleBarClick() {
            if (isPhoneOff) return;
            const lockScreen = document.getElementById('lock-screen');
            if (lockScreen.classList.contains('active')) {
                lockScreen.classList.replace('active', 'hidden');
                document.getElementById('home-screen').classList.replace('hidden', 'active');
            } else {
                closeAllApps();
            }
        }

        function openApp(id) {
            document.getElementById(id).classList.add('open');
        }

        function closeAllApps() {
            document.querySelectorAll('.app-window').forEach(win => win.classList.remove('open'));
            document.getElementById('home-screen').classList.replace('hidden', 'active');
        }

        function showSubPage(id) {
            // Close all windows first, then open the specific sub-page
            document.querySelectorAll('.app-window').forEach(win => win.classList.remove('open'));
            document.getElementById(id).classList.add('open');
        }

        // Wallpaper Logic
        function triggerFileSelect() {
            wallpaperInput.click();
        }

        wallpaperInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.querySelectorAll('.screen').forEach(s => {
                        s.style.backgroundImage = `url(${e.target.result})`;
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        // Power Logic
        function togglePower() {
            isPhoneOff = !isPhoneOff;
            document.getElementById('black-overlay').style.display = isPhoneOff ? 'block' : 'none';
            document.getElementById('home-bar').style.display = isPhoneOff ? 'none' : 'block';
            if (!isPhoneOff) {
                closeAllApps();
                document.getElementById('home-screen').classList.replace('active', 'hidden');
                document.getElementById('lock-screen').classList.replace('hidden', 'active');
            }
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ":" + 
                now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
