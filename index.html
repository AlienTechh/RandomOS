<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CleanOS 1.0 Beta - S8 Edition</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: none; 
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
        }

        .phone-wrapper {
            position: relative;
            padding-right: 12px;
        }

        /* Samsung S8 Chassis */
        .phone {
            width: 320px;
            height: 680px;
            background: #000; 
            border-radius: 48px; 
            border: 2px solid #222; 
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }

        .top-bezel {
            width: 100%; height: 25px; background: #000;
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }

        .sensor { width: 6px; height: 6px; background: #0a0a0a; border-radius: 50%; margin-left: 10px; }
        .bottom-bezel { width: 100%; height: 25px; background: #000; z-index: 1000; }

        .power-btn {
            position: absolute; right: 0; top: 150px; width: 3px; height: 45px;
            background: #333; border-radius: 0 4px 4px 0; cursor: pointer; z-index: 1001;
        }

        /* Fixed the left margin to remove the thin bezel gap */
        .screen-content {
            flex: 1; 
            width: 100%; 
            position: relative; 
            background: #000;
            transition: opacity 0.25s ease-in-out;
            border-radius: 36px;
            margin: 0; 
            overflow: hidden;
            /* Edge Curve Simulation */
            box-shadow: inset 12px 0 15px -10px rgba(0,0,0,0.7), 
                        inset -12px 0 15px -10px rgba(0,0,0,0.7);
        }

        .screen-off { opacity: 0 !important; pointer-events: none !important; }

        #lockscreen {
            position: absolute; inset: 0;
            background: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?q=80&w=2070') center/cover;
            z-index: 800; display: flex; flex-direction: column;
            align-items: center; justify-content: space-between; padding: 40px 20px 20px;
            transform: translateY(0);
        }

        .app-window {
            position: absolute; inset: 0; background: #fff; z-index: 400;
            opacity: 0; pointer-events: none;
            transform: scale(0);
            border-radius: 36px;
            overflow: hidden;
        }

        .app-window.open { opacity: 1; transform: scale(1); pointer-events: auto; }

        /* TikTok UI per Drawing */
        #tiktok { background: #000; color: white; }
        .tiktok-image { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .tt-overlay { position: absolute; inset: 0; pointer-events: none; padding: 25px; display: flex; flex-direction: column; justify-content: flex-end; }
        
        .tt-right-bottom { position: absolute; right: 20px; bottom: 80px; display: flex; flex-direction: column; align-items: center; gap: 20px; pointer-events: auto; }
        .tt-icon-btn { font-size: 30px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.9)); cursor: pointer; }
        
        .tt-info { margin-bottom: 50px; pointer-events: auto; text-shadow: 1px 1px 4px rgba(0,0,0,1); }
        .tt-username { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .tt-caption { font-size: 14px; width: 75%; line-height: 1.4; }

        /* Settings UI Renamed */
        #settings { background: #f2f2f7; color: #000; }
        .settings-header { padding: 50px 20px 10px; font-size: 28px; font-weight: bold; }
        .settings-list { background: #fff; border-top: 1px solid #ddd; margin-top: 20px; }
        .settings-item { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; }
        .back-btn { color: #007aff; cursor: pointer; padding: 10px 20px; font-size: 17px; display: inline-block; }
        .sub-page { position: absolute; inset: 0; background: #f2f2f7; z-index: 10; display: none; }
        .sub-page.active { display: block; }

        .home-grid {
            width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') center/cover;
            padding: 30px 25px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
        }

        .app-icon { width: 54px; height: 54px; border-radius: 14px; cursor: pointer; }
        /* Block context menu on images and prevent dragging/selection */
        .app-icon img { pointer-events: none; -webkit-user-drag: none; }

        .status-bar { position: absolute; top: 10px; width: 100%; padding: 0 25px; display: flex; justify-content: space-between; font-size: 11px; font-weight: 600; color: white; z-index: 600; }
        .gesture-trigger { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 15px; z-index: 900; }
        .home-bar { width: 80px; height: 4px; background: rgba(255,255,255,0.6); border-radius: 10px; }

        /* Browser App Styles */
        #browser { background: #fff; color: #000; display: flex; flex-direction: column; }
        .browser-body { flex: 1; display: flex; align-items: center; justify-content: center; background: #fff; padding: 20px; text-align: center; }
        .browser-nav { background: #f9f9f9; border-top: 1px solid #ddd; padding: 10px 15px 30px; display: flex; align-items: center; gap: 10px; }
        .url-bar { flex: 1; background: #eee; padding: 8px 15px; border-radius: 20px; font-size: 13px; color: #555; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="phone-wrapper">
        <div class="power-btn" onclick="togglePower()"></div>
        <div class="phone">
            <div class="top-bezel"><div class="sensor"></div><div class="sensor"></div></div>

            <div class="screen-content" id="screen">
                <div class="status-bar">
                    <span id="clock">09:41</span>
                    <span>5G 🔋</span> 
                </div>

                <div id="lockscreen">
                    <div style="text-align: center; color: white; margin-top: 40px;">
                        <h1 style="font-size: 50px; font-weight: 200; margin:0;" id="lock-clock">09:41</h1>
                        <p style="opacity: 0.8; margin:0;">Friday, Apr 17</p>
                    </div>
                </div>

                <div class="home-grid">
                    <div class="app-icon" onpointerdown="openApp('settings', this)">
                        <img src="https://img.icons8.com/?size=100&id=a8NHl6SmDbn7&format=png" width="100%">
                    </div>
                    <div class="app-icon" onpointerdown="openApp('tiktok', this)">
                        <img src="https://img.icons8.com/?size=100&id=118638&format=png" width="100%">
                    </div>
                    <div class="app-icon" onpointerdown="openApp('browser', this)">
                        <img src="https://cdn-icons-png.flaticon.com/128/1040/1040243.png" width="100%">
                    </div>
                </div>

                <div id="settings" class="app-window">
                    <div class="settings-header">Settings</div>
                    <div class="settings-list">
                        <div class="settings-item" onclick="showSubPage('screen-settings')"><span>Screen</span><span>›</span></div>
                    </div>
                    <div id="screen-settings" class="sub-page">
                        <div style="padding-top: 40px;"><div class="back-btn" onclick="hideSubPage('screen-settings')">‹ Settings</div></div>
                        <div class="settings-header" style="font-size: 22px;">Choose refresh rate</div>
                        <div class="settings-list">
                            <div class="settings-item" onclick="setFPS(20)">60Hz (Real 20 FPS)</div>
                            <div class="settings-item" onclick="setFPS(60)">120Hz (Real 60 FPS)</div>
                        </div>
                    </div>
                </div>

                <div id="tiktok" class="app-window">
                    <img class="tiktok-image" src="https://photo-cdn2.icons8.com/u6Kq-Mztr6T6ndoFGgWU8u9KCkCVpR5PrUAwGE4VhoQ/rs:fit:1606:1072/wm:1:re:0:0:0.65/wmid:moose/q:98/czM6Ly9pY29uczgu/bW9vc2UtcHJvZC5h/c3NldHMvYXNzZXRz/L3NhdGEvb3JpZ2lu/YWwvNjA1L2Q2MmFi/YTFmLWVhNzEtNDlk/ZC04MDRhLTU2OTVh/MzA4M2IyYi5qcGc.jpg">
                    
                    <div class="tt-overlay">
                        <div class="tt-info">
                            <div class="tt-username">@CleanOS_Project</div>
                            <div class="tt-caption">CleanOS Comming Soon? #fyp #cleanos #viral</div>
                        </div>
                        <div class="tt-right-bottom">
                            <div class="tt-icon-btn">❤️</div>
                            <div class="tt-icon-btn">💬</div>
                            <div class="tt-icon-btn">⭐</div>
                        </div>
                    </div>
                </div>

                <div id="browser" class="app-window">
                    <div class="browser-body">
                        <div>
                            <h2 style="margin:0; font-weight:300;">CleanSurf</h2>
                            <p style="font-size:12px; opacity:0.5;">Secure & Fast</p>
                        </div>
                    </div>
                    <div class="browser-nav">
                        <span style="font-size:18px;">🏠</span>
                        <div class="url-bar">https://github.com/alientechh/CleanOS</div>
                        <span style="font-size:18px;">🔄</span>
                    </div>
                </div>

                <div class="gesture-trigger" id="gesture-area">
                    <div class="home-bar"></div>
                </div>
            </div>

            <div class="bottom-bezel"></div>
        </div>
    </div>

    <script>
        let isPowerOn = true, isUnlocked = false, startY = 0, isDragging = false, targetFPS = 20, lastFrameTime = 0;
        const screen = document.getElementById('screen'), lockscreen = document.getElementById('lockscreen'), gestureArea = document.getElementById('gesture-area');

        const originalRAF = window.requestAnimationFrame;
        window.requestAnimationFrame = function(callback) {
            const now = performance.now(), interval = 1000 / targetFPS, delta = now - lastFrameTime;
            if (delta >= interval) {
                lastFrameTime = now - (delta % interval);
                return originalRAF(callback);
            } else {
                return originalRAF(() => window.requestAnimationFrame(callback));
            }
        };

        function setFPS(fps) {
            targetFPS = fps;
            const appWindows = document.querySelectorAll('.app-window');
            if (fps === 20) {
                appWindows.forEach(w => w.style.transition = "transform 0.6s steps(12), opacity 0.6s steps(12)");
                lockscreen.style.transition = "transform 0.5s steps(10)";
            } else {
                appWindows.forEach(w => w.style.transition = "transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.25s");
                lockscreen.style.transition = "transform 0.4s cubic-bezier(0.19, 1, 0.22, 1)";
            }
        }

        function openApp(id, iconElement) { 
            const app = document.getElementById(id), iconRect = iconElement.getBoundingClientRect(), screenRect = screen.getBoundingClientRect();
            app.style.transformOrigin = `${(iconRect.left + iconRect.width / 2) - screenRect.left}px ${(iconRect.top + iconRect.height / 2) - screenRect.top}px`;
            app.classList.add('open');
        }

        function goHome() { 
            document.querySelectorAll('.app-window').forEach(w => w.classList.remove('open'));
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
        }

        gestureArea.addEventListener('pointerdown', e => {
            if (!isPowerOn) return;
            isDragging = true; startY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            if (!isUnlocked) lockscreen.style.transition = 'none';
        });

        window.addEventListener('pointermove', e => {
            if (!isDragging) return;
            const currentY = e.clientY || (e.touches ? e.touches[0].clientY : 0), rawDelta = currentY - startY;
            const deltaY = (targetFPS === 20) ? Math.floor(rawDelta / 10) * 10 : rawDelta;
            if (!isUnlocked && deltaY < 0) lockscreen.style.transform = `translateY(${deltaY}px)`;
        });

        window.addEventListener('pointerup', e => {
            if (!isDragging) return;
            isDragging = false;
            const endY = e.clientY || (e.changedTouches ? e.changedTouches[0].clientY : startY);
            if (!isUnlocked) {
                if (startY - endY > 100) { lockscreen.style.transform = 'translateY(-100%)'; isUnlocked = true; }
                else { lockscreen.style.transform = 'translateY(0)'; }
            } else if (startY - endY > 50) goHome();
        });

        function showSubPage(id) { document.getElementById(id).classList.add('active'); }
        function hideSubPage(id) { document.getElementById(id).classList.remove('active'); }

        function togglePower() {
            isPowerOn = !isPowerOn;
            screen.classList.toggle('screen-off', !isPowerOn);
            if (isPowerOn) { isUnlocked = false; lockscreen.style.transform = 'translateY(0)'; goHome(); }
        }

        function updateTime() {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('clock').innerText = time; document.getElementById('lock-clock').innerText = time;
        }
        setInterval(updateTime, 1000); updateTime(); setFPS(20);
    </script>
</body>
</html>
