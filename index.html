<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomOS 1.0 Beta</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            background-color: #0a0a0a;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .phone-container {
            width: 320px; height: 650px;
            background: #000;
            border: 12px solid #1a1a1a;
            border-radius: 55px;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .power-btn {
            width: 4px; height: 60px; background: #ff3b30;
            position: absolute; right: -16px; top: 120px;
            border-radius: 0 5px 5px 0; cursor: pointer; z-index: 100;
        }

        .punch-hole {
            width: 12px; height: 12px; background: #1a1a1a;
            border-radius: 50%; position: absolute; top: 15px;
            left: 50%; transform: translateX(-50%); z-index: 90;
        }

        .screen {
            width: 100%; height: 100%;
            background: #000; position: relative;
            border-radius: 43px; overflow: hidden;
        }

        /* Power Fade Overlay */
        #power-overlay {
            position: absolute; width: 100%; height: 100%;
            background: black; z-index: 80; pointer-events: none;
            transition: opacity 0.8s ease-in-out;
            opacity: 1; /* Starts off */
        }

        .view {
            display: none; width: 100%; height: 100%;
            position: absolute; flex-direction: column;
            color: white; border-radius: 43px;
        }

        /* Home Screen with Unlock Zoom */
        #homescreen {
            background: linear-gradient(180deg, #121212 0%, #000 100%);
            padding-top: 60px;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: scale(1.2); /* Zoomed in slightly before unlock */
        }

        #homescreen.unlocked {
            transform: scale(1); /* Zooms out to normal size */
        }

        .app-grid { display: flex; padding: 20px; }
        .app-icon {
            width: 55px; height: 55px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; background: linear-gradient(#444, #222);
        }

        /* Settings App */
        #settings-app {
            display: flex; background: #000; z-index: 40;
            overflow: hidden;
            transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease;
            transform: scale(0); opacity: 0; pointer-events: none;
            transform-origin: 40px 100px; 
        }

        #settings-app.open { transform: scale(1); opacity: 1; pointer-events: auto; }

        .settings-content-wrapper { display: flex; width: 200%; height: 100%; transition: transform 0.5s ease; }
        .settings-page { width: 50%; height: 100%; display: flex; flex-direction: column; }
        .settings-header { padding: 50px 20px 20px; font-size: 24px; font-weight: bold; }
        .settings-item { padding: 18px 20px; border-bottom: 1px solid #1c1c1e; display: flex; justify-content: space-between; }

        /* Home Bar */
        #home-bar {
            width: 110px; height: 4px; background: rgba(255, 255, 255, 0.4);
            border-radius: 10px; position: absolute; bottom: 8px;
            left: 50%; transform: translateX(-50%); z-index: 100;
            cursor: pointer; opacity: 0; pointer-events: none;
            transition: opacity 0.5s;
        }

        #lockscreen { padding-top: 80px; align-items: center; }
        #time { font-size: 3.5rem; font-weight: 200; margin: 0; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="power-btn" onclick="togglePower()"></div>
        <div class="punch-hole"></div>
        <div id="home-bar" onclick="handleHomeBar()"></div>

        <div class="screen" id="main-screen">
            <div id="power-overlay"></div>

            <div id="lockscreen" class="view">
                <p id="time">00:00</p>
                <p style="font-size: 12px; color: #444; position: absolute; bottom: 50px;">Unlock</p>
            </div>

            <div id="homescreen" class="view">
                <div class="app-grid">
                    <div onclick="openSettings()" style="cursor:pointer">
                        <div class="app-icon">⚙️</div>
                        <p style="font-size: 10px; text-align: center; color: white;">Settings</p>
                    </div>
                </div>
            </div>

            <div id="settings-app" class="view">
                <div class="settings-content-wrapper" id="settings-nav">
                    <div class="settings-page">
                        <div class="settings-header">Settings</div>
                        <div class="settings-item" onclick="goToAbout()">About Phone <span>></span></div>
                    </div>
                    <div class="settings-page">
                        <div class="settings-header"><span onclick="goBackToSettings()" style="color:#007aff; cursor:pointer">❮ Back</span></div>
                        <p style="text-align:center; font-size: 24px;">RandomOS 1.0</p>
                        <div style="padding: 20px; display:flex; justify-content:space-between; font-size:14px;">
                            <span style="color:#888">Phone Name</span><span>rPhone 1 Pro</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isPowerOn = false;
        let isUnlocked = false;

        function togglePower() {
            const overlay = document.getElementById('power-overlay');
            const homeBar = document.getElementById('home-bar');
            const lock = document.getElementById('lockscreen');
            const home = document.getElementById('homescreen');
            const settings = document.getElementById('settings-app');

            isPowerOn = !isPowerOn;

            if (isPowerOn) {
                overlay.style.opacity = '0';
                homeBar.style.opacity = '1';
                homeBar.style.pointerEvents = 'auto';
                lock.style.display = 'flex';
                updateClock();
            } else {
                overlay.style.opacity = '1';
                homeBar.style.opacity = '0';
                homeBar.style.pointerEvents = 'none';
                settings.classList.remove('open');
                // Reset states after fade
                setTimeout(() => {
                    lock.style.display = 'none';
                    home.style.display = 'none';
                    home.classList.remove('unlocked');
                    isUnlocked = false;
                }, 800);
            }
        }

        function handleHomeBar() {
            const settings = document.getElementById('settings-app');
            const lock = document.getElementById('lockscreen');
            const home = document.getElementById('homescreen');

            if (settings.classList.contains('open')) {
                settings.classList.remove('open');
                setTimeout(goBackToSettings, 700);
            } else if (isPowerOn && !isUnlocked) {
                isUnlocked = true;
                lock.style.display = 'none';
                home.style.display = 'flex';
                // Trigger Zoom-Out Animation
                setTimeout(() => home.classList.add('unlocked'), 10);
            }
        }

        function openSettings() { document.getElementById('settings-app').classList.add('open'); }
        function goToAbout() { document.getElementById('settings-nav').style.transform = "translateX(-50%)"; }
        function goBackToSettings() { document.getElementById('settings-nav').style.transform = "translateX(0%)"; }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = 
                `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
