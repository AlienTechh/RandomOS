<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomOS 1.0 Beta</title>
    <style>
        body {
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, sans-serif;
            user-select: none;
            /* Removes the blue highlight on click */
            -webkit-tap-highlight-color: transparent; 
        }

        .phone-container {
            width: 320px;
            height: 650px;
            background: #000;
            border: 12px solid #1a1a1a;
            border-radius: 55px;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: visible;
        }

        .power-btn {
            width: 4px; height: 60px; background: #ff3b30;
            position: absolute; right: -16px; top: 120px;
            border-radius: 0 5px 5px 0; cursor: pointer; z-index: 100;
        }

        .punch-hole {
            width: 12px; height: 12px; background: #1a1a1a;
            border-radius: 50%; position: absolute; top: 15px;
            left: 50%; transform: translateX(-50%); z-index: 50;
        }

        .screen {
            flex-grow: 1; background: #000; position: relative;
            border-radius: 43px; overflow: hidden;
        }

        .view {
            display: none; width: 100%; height: 100%;
            position: absolute; flex-direction: column;
            align-items: center; color: white;
            border-radius: 43px; /* Matches screen curve */
        }

        /* Lockscreen */
        #lockscreen { padding-top: 80px; }
        #time { font-size: 3.5rem; font-weight: 200; margin: 0; }

        /* Home Screen */
        #homescreen {
            background: linear-gradient(180deg, #121212 0%, #000 100%);
            padding-top: 60px;
        }

        .app-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 20px; padding: 20px;
        }

        .app-container { text-align: center; cursor: pointer; border-radius: 12px; }
        .app-icon {
            width: 55px; height: 55px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; margin-bottom: 5px;
            background: #2c2c2e;
        }
        .app-label { font-size: 10px; color: white; }

        /* Settings App - Slide Up Animation */
        #settings-app {
            background: #1c1c1e;
            z-index: 40;
            transition: transform 0.4s cubic-bezier(0.3, 1, 0.3, 1), opacity 0.2s;
            transform: translateY(100%); /* Start off-screen at bottom */
            opacity: 0;
            display: flex; /* Always flex, transition handles visibility */
        }

        #settings-app.open {
            transform: translateY(0); /* Slide into view */
            opacity: 1;
        }

        .settings-header {
            width: 100%; padding: 50px 20px 20px;
            font-size: 24px; font-weight: bold; border-bottom: 1px solid #2c2c2e;
        }

        .settings-list { width: 100%; padding: 10px 20px; font-size: 14px; box-sizing: border-box;}
        .settings-item { padding: 18px 0; border-bottom: 1px solid #2c2c2e; color: #eee; }

        /* Home Bar */
        #home-bar {
            width: 110px; height: 4px; background: rgba(255, 255, 255, 0.4);
            border-radius: 10px; position: absolute; bottom: 8px;
            left: 50%; transform: translateX(-50%); z-index: 60;
            cursor: pointer; display: none;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="power-btn" onclick="togglePower()"></div>
        <div class="punch-hole"></div>
        <div id="home-bar" onclick="handleHomeBar()"></div>

        <div class="screen" id="main-screen">
            <div id="lockscreen" class="view">
                <p id="time">00:00</p>
                <p style="font-size: 12px; color: #555; position: absolute; bottom: 50px;">Tap home bar to unlock</p>
            </div>

            <div id="homescreen" class="view">
                <div class="app-grid">
                    <div class="app-container" onclick="openSettings()">
                        <div class="app-icon" style="background: linear-gradient(#444, #222);">⚙️</div>
                        <div class="app-label">Settings</div>
                    </div>
                </div>
            </div>

            <div id="settings-app" class="view">
                <div class="settings-header">Settings</div>
                <div class="settings-list">
                    <div class="settings-item">RandomOS Version: 1.0 Beta</div>
                    <div class="settings-item">Storage: 99% Random</div>
                    <div class="settings-item">System Updates</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isPowerOn = false;
        let isUnlocked = false;
        let isAppSettingsOpen = false;

        const views = {
            lock: document.getElementById('lockscreen'),
            home: document.getElementById('homescreen'),
            settings: document.getElementById('settings-app'),
            bar: document.getElementById('home-bar')
        };

        function togglePower() {
            isPowerOn = !isPowerOn;
            
            if (!isPowerOn) {
                // Shut down logic
                isUnlocked = false;
                isAppSettingsOpen = false;
                views.lock.style.display = 'none';
                views.home.style.display = 'none';
                views.settings.classList.remove('open');
                views.bar.style.display = 'none';
            } else {
                // Power on logic
                views.lock.style.display = 'flex';
                views.bar.style.display = 'block';
                updateClock();
            }
        }

        function handleHomeBar() {
            if (!isPowerOn) return;
            
            if (!isUnlocked) {
                isUnlocked = true;
                views.lock.style.display = 'none';
                views.home.style.display = 'flex';
            } else if (isAppSettingsOpen) {
                isAppSettingsOpen = false;
                views.settings.classList.remove('open');
            }
        }

        function openSettings() {
            isAppSettingsOpen = true;
            views.settings.classList.add('open');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = 
                `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
