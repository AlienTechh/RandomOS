<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FakeOS 1.0 - AI Edition</title>
    <style>
        :root { 
            --spd: 0.5s; 
            --ios-spring: cubic-bezier(0.3, 1.2, 0.3, 1); 
            --bright: 1;
            --ios-blue: #007aff;
            --bg-app: #f2f2f7;
            --bg-item: #fff;
            --text-main: #000;
            --border-color: #d1d1d6;
            --aod-weight: 200;
        }

        .dark-mode {
            --bg-app: #1c1c1e;
            --bg-item: #2c2c2e;
            --text-main: #ffffff;
            --border-color: #3a3a3c;
        }
        
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: radial-gradient(circle at center, #1c1c1e 0%, #000 100%); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation;
        }
        
        .phone { 
            width: 290px; height: 600px; background: #000; 
            border: 10px solid #2c2c2e; border-radius: 54px; 
            position: relative; overflow: hidden; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        /* [EXISTING BOOT, AOD, STATUS STYLES UNCHANGED] */
        .boot-screen { position: absolute; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; transition: opacity 0.5s ease; }
        .boot-logo { font-size: 32px; font-weight: 800; letter-spacing: 1px; }
        .boot-spinner { margin-top: 25px; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .aod-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 4500; display: none; flex-direction: column; justify-content: center; align-items: center; color: rgba(255, 255, 255, 0.2); pointer-events: none; }
        .aod-time { font-size: 40px; font-weight: var(--aod-weight); transition: font-weight 0.3s; }
        .aod-date { font-size: 12px; margin-top: 5px; text-transform: uppercase; }
        .brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; pointer-events: none; z-index: 3800; opacity: calc(1 - var(--bright)); }
        .punch-hole { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 80px; height: 22px; background: #000; border-radius: 20px; z-index: 3900; border: 1px solid #1a1a1a; }
        .status-bar { position: absolute; top: 0; width: 100%; height: 40px; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; box-sizing: border-box; color: white; font-size: 12px; font-weight: 600; z-index: 3500; }
        .control-center { position: absolute; top: 0; right: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 2500; transform: translateY(-100%); transition: transform 0.5s var(--ios-spring); display: flex; flex-direction: column; align-items: center; padding-top: 100px; gap: 15px; }
        .cc-open { transform: translateY(0); }
        .cc-slider-box { width: 220px; background: rgba(255,255,255,0.15); padding: 20px; border-radius: 28px; color: white; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .cc-btn { width: 220px; padding: 15px; background: rgba(255,255,255,0.15); border-radius: 20px; color: white; font-weight: 600; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .screen-off { position: absolute; width: 100%; height: 100%; background: #000; z-index: 4000; transition: opacity 0.4s; cursor: pointer; opacity: 0; pointer-events: none; }
        .screen-is-off { opacity: 1; pointer-events: auto; }
        .wallpaper { position: absolute; width: 100%; height: 100%; background: #1a3a5a url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover; transition: transform 0.8s var(--ios-spring), filter 0.5s; z-index: 1; transform: scale(1.1); }
        .cc-active .wallpaper { filter: blur(25px) brightness(0.6); transform: scale(1.15); }
        .lockscreen { position: absolute; width: 100%; height: 100%; z-index: 3000; display: flex; flex-direction: column; align-items: center; padding-top: 80px; color: white; transition: transform 0.7s var(--ios-spring), opacity 0.4s; }
        .lock-time { font-size: 64px; font-weight: 200; }
        .pin-pad { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); z-index: 3100; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .pin-dots { display: flex; gap: 15px; margin-bottom: 40px; }
        .dot { width: 12px; height: 12px; border: 1.5px solid #fff; border-radius: 50%; }
        .dot.active { background: #fff; transform: scale(1.2); }
        .num-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .num-btn { width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: pointer; }
        .fingerprint-scanner { margin-top: auto; margin-bottom: 100px; width: 70px; height: 70px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%; display: none; justify-content: center; align-items: center; font-size: 32px; animation: pulse 2s infinite; pointer-events: auto; cursor: pointer; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.3); } 70% { box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); } }

        /* Draggable Icons */
        .drag-btn { position: absolute; width: 56px; height: 56px; border-radius: 14px; display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: grab; z-index: 5; opacity: 0; transform: scale(0.5); transition: opacity 0.5s, transform 0.6s var(--ios-spring); }
        .icon-normal-settings { background: linear-gradient(180deg, #5e5e62 0%, #2c2c2e 100%); color: #fff; }
        .icon-normal-cc { background: linear-gradient(180deg, #007aff 0%, #004080 100%); color: #fff; }
        .icon-ai { background: linear-gradient(135deg, #8e2de2, #4a00e0); color: white; }
        .icon-glassy { background: rgba(255, 255, 255, 0.2) !important; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.2); color: #fff; }

        #settingsBtn { top: 110px; left: 30px; }
        #ccIconBtn { top: 110px; left: 105px; }
        #aiBtn { top: 110px; left: 180px; }

        /* App General */
        .app { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-app); z-index: 100; transform: scale(0); opacity: 0; pointer-events: none; transition: transform var(--spd) var(--ios-spring), opacity 0.3s; display: flex; flex-direction: column; border-radius: 44px; overflow: hidden; }
        .header { padding: 50px 20px 15px; font-weight: 700; font-size: 32px; color: var(--text-main); background: var(--bg-app); }
        .item { padding: 14px 20px; font-size: 17px; border-bottom: 0.5px solid var(--border-color); color: var(--text-main); display: flex; justify-content: space-between; background: var(--bg-item); align-items: center; }

        /* AI Assistant Specific UI */
        #aiContent { flex: 1; display: flex; flex-direction: column; padding: 10px; overflow-y: auto; background: var(--bg-app); }
        .chat-bubble { max-width: 80%; padding: 10px 15px; border-radius: 18px; margin-bottom: 10px; font-size: 15px; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: var(--ios-blue); color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: var(--bg-item); color: var(--text-main); border-bottom-left-radius: 4px; border: 0.5px solid var(--border-color); }
        .chat-input-area { padding: 15px; background: var(--bg-item); display: flex; gap: 10px; align-items: center; border-top: 0.5px solid var(--border-color); padding-bottom: 30px; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid var(--border-color); outline: none; background: var(--bg-app); color: var(--text-main); }
        .voice-btn { width: 35px; height: 35px; border-radius: 50%; background: #ff3b30; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; }
        .voice-btn.listening { animation: pulse 1s infinite; background: #4cd964; }

        /* Multitasking */
        .multitasking-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 80; display: none; background: rgba(0,0,0,0.1); }
        .recents-view .multitasking-overlay { display: block; pointer-events: auto; }
        .recents-view .drag-btn { opacity: 0 !important; pointer-events: none !important; }
        .recents-view .app.is-running { display: flex !important; opacity: 1 !important; left: 50% !important; top: 45% !important; transform: translate(-50%, -50%) scale(0.65) !important; pointer-events: none !important; box-shadow: 0 30px 60px rgba(0,0,0,0.5); z-index: 105; }
        .home-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 5px; background: rgba(255,255,255,0.8); border-radius: 10px; z-index: 3500; cursor: pointer; }

        .is-unlocked .wallpaper { transform: scale(1); }
        .is-unlocked .drag-btn { opacity: 1; transform: scale(1); }
        .is-unlocked .lockscreen { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        .open .app { transform: scale(1) !important; opacity: 1 !important; pointer-events: auto !important; z-index: 1000; left: 0 !important; top: 0 !important; }
        .open .wallpaper { filter: blur(25px); transform: scale(1.15) !important; }
    </style>
</head>
<body id="mainBody">

    <div class="phone" id="phone" ondblclick="handleDoubleTap(event)">

        <div class="boot-screen" id="bootScreen"><div class="boot-logo">FakeOS</div><div class="boot-spinner"></div></div>
        <div class="aod-layer" id="aod"><div class="aod-time" id="aodTime">00:00</div><div class="aod-date" id="aodDate">Thursday, April 9</div></div>
        <div class="brightness-overlay"></div>
        <div class="punch-hole"></div>
        <div class="screen-off" id="blackOverlay"></div>
        <div class="wallpaper" id="mainWallpaper"></div>

        <div class="status-bar">
            <span id="st-time">12:00</span>
            <div class="battery-section" onclick="toggleCC(true)">
                <span id="battery-level">--%</span>
            </div>
        </div>

        <div class="lockscreen" id="lockView">
            <div class="lock-time" id="clock">12:00</div>
            <div class="fingerprint-scanner" id="fp-icon" onclick="unlockByFingerprint()"></div>
        </div>

        <div class="pin-pad" id="pinPad">
            <div id="pinStatus" style="margin-bottom: 25px;">Enter PIN</div>
            <div class="pin-dots" id="pinDots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="num-grid" id="nums">
                <div class="num-btn" onclick="inputPin(1)">1</div><div class="num-btn" onclick="inputPin(2)">2</div><div class="num-btn" onclick="inputPin(3)">3</div>
                <div class="num-btn" onclick="inputPin(4)">4</div><div class="num-btn" onclick="inputPin(5)">5</div><div class="num-btn" onclick="inputPin(6)">6</div>
                <div class="num-btn" onclick="inputPin(7)">7</div><div class="num-btn" onclick="inputPin(8)">8</div><div class="num-btn" onclick="inputPin(9)">9</div>
                <div></div><div class="num-btn" onclick="inputPin(0)">0</div>
            </div>
            <div onclick="closePinPad()" style="margin-top:20px;">Cancel</div>
        </div>

        <div class="drag-btn icon-normal-settings" id="settingsBtn" onmousedown="setupDrag(event, this, 'settings')" ontouchstart="setupDrag(event, this, 'settings')"></div>
        <div class="drag-btn icon-normal-cc" id="ccIconBtn" onmousedown="setupDrag(event, this, 'cc')" ontouchstart="setupDrag(event, this, 'cc')"></div>
        <div class="drag-btn icon-ai" id="aiBtn" onmousedown="setupDrag(event, this, 'ai')" ontouchstart="setupDrag(event, this, 'ai')">🤖</div>

        <div class="app" id="settingsApp">
            <div class="header">Settings</div>
            <div id="p1" class="page">
                <div class="item" onclick="showPage(6)">Screen Lock <span>›</span></div>
                <div class="item" onclick="showPage(4)">About Phone <span>›</span></div>
                <div class="item" onclick="showPage(2)">Animation Speed <span>›</span></div>
            </div>
            <div id="p2" class="page" style="display:none;"><div class="item" onclick="setSpd('0.5s')">Normal</div><div class="item" onclick="showPage(1)">Back</div></div>
            <div id="p4" class="page" style="display:none;"><div style="padding:40px; text-align:center;"><h1>FakeOS 1.0</h1></div><div class="item" onclick="showPage(1)">Back</div></div>
            <div id="p6" class="page" style="display:none;"><div class="item" onclick="createPin()">Create PIN</div><div class="item" onclick="showPage(1)">Back</div></div>
        </div>

        <div class="app" id="aiApp">
            <div class="header">Assistant</div>
            <div id="aiContent">
                <div class="chat-bubble ai-msg">Hello! I am your AI assistant. How can I help you today?</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="aiInput" placeholder="Ask something...">
                <div class="voice-btn" id="voiceBtn" onclick="toggleVoice()">🎙️</div>
                <div style="color:var(--ios-blue); font-weight:600;" onclick="sendAiMessage()">Send</div>
            </div>
        </div>

        <div class="control-center" id="ccPanel">
            <div class="cc-slider-box">
                <input type="range" min="0.1" max="1" step="0.1" value="1" oninput="changeBrightness(this.value)" style="width:100%;">
            </div>
            <div class="cc-btn" onclick="toggleDarkMode()">Toggle Dark Mode</div>
            <div class="cc-btn" onclick="toggleCC(false)">Done</div>
        </div>

        <div class="home-bar" id="bottomBar" onmousedown="handleHomeStart()" onmouseup="handleHomeEnd()" ontouchstart="handleHomeStart()" ontouchend="handleHomeEnd()"></div>
        
        <audio id="sound-unlock" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>
        <audio id="sound-lock" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    </div>

    <script>
        // System initialization
        window.addEventListener('load', () => {
            setTimeout(() => {
                const boot = document.getElementById('bootScreen');
                boot.style.opacity = '0';
                setTimeout(() => boot.style.display = 'none', 500);
            }, 2000);
        });

        const phone = document.getElementById('phone'), 
              blackOverlay = document.getElementById('blackOverlay'), 
              settingsApp = document.getElementById('settingsApp'),
              aiApp = document.getElementById('aiApp'),
              ccPanel = document.getElementById('ccPanel');
        
        let isPowerOn = true, activePin = null, currentPinInput = "", activeApp = null;
        let homeTimer;

        // Sound & Basic Logic (Retained from your script)
        function playSfx(s) { s.currentTime = 0; s.play().catch(e => {}); }

        function handleHomeStart() {
            if (isPowerOn && phone.classList.contains('is-unlocked')) {
                homeTimer = setTimeout(() => { phone.classList.add('recents-view'); }, 600);
            }
        }

        function handleHomeEnd() {
            clearTimeout(homeTimer);
            if (!phone.classList.contains('recents-view')) handleHomeBar();
        }

        function handleHomeBar() {
            if (ccPanel.classList.contains('cc-open')) return toggleCC(false);
            if (phone.classList.contains('recents-view')) return phone.classList.remove('recents-view');
            
            if (isPowerOn && !phone.classList.contains('is-unlocked')) {
                if(activePin) document.getElementById('pinPad').style.display = 'flex';
                else { phone.classList.add('is-unlocked'); playSfx(document.getElementById('sound-unlock')); }
            } else {
                phone.classList.remove('open');
                activeApp = null;
            }
        }

        // DRAG LOGIC (Updated to include AI App)
        function setupDrag(e, el, type) {
            if (!phone.classList.contains('is-unlocked') || phone.classList.contains('open')) return;
            let moved = false;
            const isTouch = e.type === 'touchstart';
            const startX = isTouch ? e.touches[0].clientX : e.clientX;
            const startY = isTouch ? e.touches[0].clientY : e.clientY;
            const initX = el.offsetLeft, initY = el.offsetTop;

            const move = (ev) => {
                const curX = isTouch ? ev.touches[0].clientX : ev.clientX;
                const curY = isTouch ? ev.touches[0].clientY : ev.clientY;
                if (Math.abs(curX - startX) > 5) moved = true;
                el.style.left = Math.max(10, Math.min(initX + (curX - startX), 210)) + 'px';
                el.style.top = Math.max(40, Math.min(initY + (curY - startY), 480)) + 'px';
            };

            const stop = () => {
                document.removeEventListener(isTouch ? 'touchmove' : 'mousemove', move);
                document.removeEventListener(isTouch ? 'touchend' : 'mouseup', stop);
                if (!moved) {
                    phone.classList.add('open');
                    if(type === 'settings') { settingsApp.classList.add('is-running'); activeApp = settingsApp; }
                    if(type === 'ai') { aiApp.classList.add('is-running'); activeApp = aiApp; }
                    if(type === 'cc') { phone.classList.remove('open'); toggleCC(true); }
                }
            };
            document.addEventListener(isTouch ? 'touchmove' : 'mousemove', move);
            document.addEventListener(isTouch ? 'touchend' : 'mouseup', stop);
        }

        // AI ASSISTANT LOGIC
        function sendAiMessage() {
            const input = document.getElementById('aiInput');
            const chat = document.getElementById('aiContent');
            if (!input.value.trim()) return;

            // Add User Message
            const userDiv = document.createElement('div');
            userDiv.className = 'chat-bubble user-msg';
            userDiv.innerText = input.value;
            chat.appendChild(userDiv);

            const userText = input.value.toLowerCase();
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            // Generate AI Response
            setTimeout(() => {
                const aiDiv = document.createElement('div');
                aiDiv.className = 'chat-bubble ai-msg';
                let response = "I'm not sure about that. Try asking for the time or to toggle dark mode!";
                
                if(userText.includes("time")) response = "The current time is " + document.getElementById('st-time').innerText;
                else if(userText.includes("hello")) response = "Hi there! I'm your FakeOS helper.";
                else if(userText.includes("dark mode")) { response = "Switching appearance now..."; toggleDarkMode(); }
                else if(userText.includes("who are you")) response = "I am a built-in AI assistant for your virtual phone.";
                
                aiDiv.innerText = response;
                chat.appendChild(aiDiv);
                chat.scrollTop = chat.scrollHeight;
                
                // Real Talk (Text-to-Speech)
                const speech = new SpeechSynthesisUtterance(response);
                window.speechSynthesis.speak(speech);
            }, 800);
        }

        // VOICE RECOGNITION (Talk to AI)
        function toggleVoice() {
            const voiceBtn = document.getElementById('voiceBtn');
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            
            recognition.onstart = () => { voiceBtn.classList.add('listening'); };
            recognition.onend = () => { voiceBtn.classList.remove('listening'); };
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('aiInput').value = transcript;
                sendAiMessage();
            };
            recognition.start();
        }

        // Remaining helpers (Retained)
        function toggleDarkMode() { document.getElementById('mainBody').classList.toggle('dark-mode'); }
        function toggleCC(o) { ccPanel.classList.toggle('cc-open', o); }
        function changeBrightness(v) { document.documentElement.style.setProperty('--bright', v); }
        function showPage(n) { document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); document.getElementById('p' + n).style.display = 'block'; }
        function updateTime() { 
            const now = new Date(); 
            const t = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0'); 
            document.getElementById('clock').innerText = t; document.getElementById('st-time').innerText = t; 
        }
        setInterval(updateTime, 1000); updateTime();
        async function updateBattery() { try { const b = await navigator.getBattery(); document.getElementById('battery-level').innerText = Math.floor(b.level * 100) + "%"; } catch(e){} }
        updateBattery();
    </script>
</body>
</html>
